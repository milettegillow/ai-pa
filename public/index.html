<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="/ai-pa-favicon.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Assistant</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #1e1e1a;
        --bg-card: #232320;
        --border: #2a2a24;
        --bg-header: #191916;
        --accent: #7c9e8a;
        --accent-secondary: #a8c5bc;
        --text: #e8f0ec;
        --text-muted: #a8c5bc;
        --text-faded: #555;
        --user-bubble-bg: #243028;
        --user-bubble-border: #7c9e8a;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Outfit", sans-serif;
        font-weight: 300;
        font-size: 22px;
        line-height: 1.6;
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
        grid-template-columns: 25% 45% 30%;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Header ──────────────────────────────────── */

      .header {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: var(--bg-header);
        border-bottom: 1px solid var(--border);
      }

      .header-greeting {
        font-weight: 300;
        font-style: italic;
        font-size: 1rem;
        color: var(--text);
      }

      .header-date {
        font-weight: 400;
        font-size: 0.58rem;
        color: var(--text-faded);
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }

      .toolkit-link {
        font-size: 0.55rem;
        font-weight: 400;
        color: var(--muted);
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px 12px;
        transition: color 0.15s, border-color 0.15s;
      }

      .toolkit-link:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      /* ── Section Labels ──────────────────────────── */

      .section-label {
        font-size: 1.1rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: var(--accent);
        margin-bottom: 8px;
      }

      /* ── Left Column: Agenda ─────────────────────── */

      .col-agenda {
        padding: 16px;
        overflow-y: auto;
      }

      .agenda-date {
        display: none;
      }

      .event-card {
        border-left: 2px solid var(--accent);
        background: var(--bg-card);
        padding: 12px 14px;
        margin-bottom: 8px;
        border-top: 1px solid var(--border);
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        border-radius: 0 2px 2px 0;
      }

      .event-time {
        font-size: 0.58rem;
        font-weight: 500;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin-bottom: 2px;
      }

      .event-title {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
      }

      .event-location {
        font-size: 12px;
        font-weight: 300;
        color: var(--text-faded);
        margin-top: 2px;
      }

      .agenda-empty {
        font-weight: 300;
        color: var(--text-faded);
        font-size: 0.8rem;
        margin-top: 4px;
      }

      .agenda-loading {
        color: var(--text-faded);
        font-size: 13px;
        font-weight: 300;
      }

      .agenda-section-divider {
        font-size: 0.58rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--text-faded);
        margin-top: 20px;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
      }

      /* ── Centre Column: Inbox ────────────────────── */

      .col-inbox {
        background: #242421;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .col-inbox-header {
        padding: 16px 16px 0;
      }

      .inbox-header-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .btn-refresh {
        font-size: 0.6rem;
        font-weight: 400;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 3px 10px;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
      }

      .btn-refresh:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .btn-refresh:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .inbox-count {
        font-size: 12px;
        font-weight: 300;
        color: var(--text-faded);
        margin-bottom: 4px;
      }

      .inbox-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 16px 16px;
      }

      .email-card {
        padding: 16px 0;
        margin-bottom: 4px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }

      .email-card-inner {
        padding: 0;
      }

      .email-header-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 2px;
      }

      .email-sender {
        font-weight: 500;
        font-size: 14px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .email-unread-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }

      .email-time {
        font-size: 11px;
        font-weight: 300;
        color: var(--text-faded);
        white-space: nowrap;
      }

      .email-subject {
        font-size: 13px;
        font-weight: 300;
        color: var(--accent);
        margin-bottom: 4px;
      }

      .email-preview {
        font-size: 12px;
        font-weight: 300;
        color: var(--text-faded);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.5;
      }

      .email-expanded {
        display: none;
        margin-top: 12px;
        padding: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 2px;
      }

      .email-expanded.visible {
        display: block;
      }

      .email-expanded-body {
        font-size: 13px;
        font-weight: 300;
        line-height: 1.75;
        white-space: pre-wrap;
        color: var(--text);
        margin-bottom: 14px;
      }

      .email-body-frame {
        width: 100%;
        border: none;
        border-radius: 6px;
        background: #fff;
        margin-bottom: 14px;
        min-height: 80px;
      }

      .email-recipients-toggle {
        font-size: 11px;
        font-weight: 300;
        color: var(--text-faded);
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        font-family: inherit;
        margin-bottom: 8px;
        display: inline-block;
      }

      .email-recipients-toggle:hover {
        color: var(--muted);
      }

      .email-recipients {
        display: none;
        font-size: 11px;
        font-weight: 300;
        color: var(--text-faded);
        margin-bottom: 10px;
        line-height: 1.6;
      }

      .email-recipients.visible {
        display: block;
      }

      .email-recipients-label {
        color: var(--muted);
        font-weight: 400;
      }

      .draft-options {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .btn-option {
        font-family: inherit;
        font-size: 0.6rem;
        font-weight: 400;
        color: var(--text-muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 5px 12px;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }

      .btn-option:hover {
        color: var(--text);
        border-color: var(--accent);
        background: #7c9e8a0d;
      }

      .draft-custom-input {
        width: 100%;
        font-family: inherit;
        font-size: 12px;
        font-weight: 300;
        color: var(--text);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 10px;
        margin-bottom: 10px;
        outline: none;
      }

      .draft-custom-input::placeholder {
        color: var(--text-faded);
      }

      .draft-custom-input:focus {
        border-color: var(--accent);
      }

      .thread-toggle {
        font-family: inherit;
        font-size: 0.6rem;
        font-weight: 400;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px 12px;
        cursor: pointer;
        margin-bottom: 14px;
        transition: color 0.15s, border-color 0.15s;
      }

      .thread-toggle:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .thread-previous {
        display: none;
        border-top: 1px solid var(--border);
        padding-top: 12px;
        margin-bottom: 14px;
      }

      .thread-previous.visible {
        display: block;
      }

      .thread-previous .email-expanded-body {
        color: var(--text-faded);
      }

      .inbox-empty {
        font-weight: 300;
        color: var(--text-faded);
        font-size: 0.8rem;
      }

      .inbox-loading {
        color: var(--text-faded);
        font-size: 13px;
        font-weight: 300;
        padding: 8px 0;
      }

      /* ── Right Column: Chat ──────────────────────── */

      .col-chat {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .col-chat-header {
        padding: 16px 16px 12px;
      }

      .chat-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }

      .btn {
        font-family: "Outfit", sans-serif;
        font-size: 0.68rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        padding: 8px 16px;
        border: 1px solid var(--accent);
        border-radius: 12px;
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        transition: all 0.15s ease;
        white-space: nowrap;
      }

      .btn:hover {
        background: var(--accent);
        color: var(--bg);
      }

      .btn-briefing {
        width: 100%;
        display: block;
        background: #7c9e8a33;
        border-color: transparent;
      }

      .btn-briefing:hover {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }

      .btn-send {
        font-family: "Outfit", sans-serif;
        font-size: 0.68rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: 12px;
        padding: 10px 18px;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-send:hover {
        background: var(--accent-secondary);
      }

      .btn-small {
        font-size: 0.62rem;
        padding: 6px 12px;
      }

      .btn-draft {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }

      .btn-draft:hover {
        background: var(--accent-secondary);
      }

      .btn-mark-read {
        background: transparent;
        color: var(--muted);
        border-color: var(--border);
      }

      .btn-mark-read:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .email-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .draft-box {
        margin-top: 10px;
        border-top: 1px solid var(--border);
        padding-top: 10px;
      }

      .draft-loading {
        font-size: 0.7rem;
        color: var(--muted);
        padding: 8px 0;
      }

      .draft-textarea {
        width: 100%;
        min-height: 100px;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        font-family: inherit;
        font-size: 0.7rem;
        line-height: 1.5;
        resize: vertical;
        box-sizing: border-box;
      }

      .draft-textarea:focus {
        outline: none;
        border-color: var(--accent);
      }

      .draft-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }

      .btn-send-draft {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }

      .btn-send-draft:hover {
        background: var(--accent-secondary);
      }

      .btn-regenerate {
        background: transparent;
        color: var(--text);
        border-color: var(--border);
      }

      .btn-regenerate:hover {
        border-color: var(--muted);
      }

      .btn-discard {
        background: transparent;
        color: var(--muted);
        border: none;
        font-size: 0.58rem;
        padding: 4px 8px;
        cursor: pointer;
      }

      .btn-discard:hover {
        color: var(--text);
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 8px 16px 16px;
      }

      .chat-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-faded);
        font-weight: 300;
        font-size: 13px;
        text-align: center;
        padding: 24px;
        line-height: 1.7;
      }

      .message {
        max-width: 88%;
        margin-bottom: 12px;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        margin-left: auto;
      }

      .message-label {
        font-size: 0.54rem;
        font-weight: 500;
        color: var(--text-faded);
        margin-bottom: 3px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }

      .message.user .message-label {
        text-align: right;
      }

      .message-bubble {
        padding: 10px 14px;
        border-radius: 2px;
        font-size: 13px;
        font-weight: 300;
        line-height: 1.65;
      }

      .message.user .message-bubble {
        background: var(--user-bubble-bg);
        border: 1px solid var(--user-bubble-border);
        color: var(--text);
      }

      .message.assistant .message-bubble {
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text);
      }

      .message.assistant .message-bubble p {
        margin-bottom: 8px;
      }
      .message.assistant .message-bubble p:last-child {
        margin-bottom: 0;
      }
      .message.assistant .message-bubble strong {
        color: var(--accent);
        font-weight: 500;
      }
      .message.assistant .message-bubble ul,
      .message.assistant .message-bubble ol {
        padding-left: 18px;
        margin-bottom: 8px;
      }
      .message.assistant .message-bubble li {
        margin-bottom: 3px;
      }
      .message.assistant .message-bubble code {
        background: var(--bg);
        padding: 1px 5px;
        border-radius: 0;
        font-size: 12px;
      }
      .message.assistant .message-bubble pre {
        background: var(--bg);
        padding: 10px;
        border-radius: 0;
        overflow-x: auto;
        margin-bottom: 8px;
      }

      .typing-indicator {
        display: none;
        padding: 6px 16px;
        color: var(--text-faded);
        font-weight: 300;
        font-size: 12px;
      }

      .typing-indicator.visible {
        display: block;
      }

      /* ── Chat Input ──────────────────────────────── */

      .chat-input-bar {
        display: flex;
        gap: 8px;
        padding: 12px 16px 16px;
        border-top: 1px solid var(--border);
      }

      .chat-input-bar textarea {
        flex: 1;
        font-family: "Outfit", sans-serif;
        font-weight: 300;
        font-size: 13px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--bg-card);
        color: var(--text);
        resize: none;
        outline: none;
        line-height: 1.5;
        max-height: 100px;
      }

      .chat-input-bar textarea::placeholder {
        color: var(--text-faded);
      }
      .chat-input-bar textarea:focus {
        border-color: var(--accent);
      }

      /* ── Scrollbar ────────────────────────────────── */

      /* ── Skeleton Shimmer Loader ─────────────────── */

      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }

      .skeleton {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .skeleton-bar {
        height: 12px;
        border-radius: 6px;
        background: linear-gradient(
          90deg,
          var(--border) 25%,
          #3a3a34 50%,
          var(--border) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }

      .skeleton-bar.w-60 {
        width: 60%;
      }
      .skeleton-bar.w-80 {
        width: 80%;
      }
      .skeleton-bar.w-40 {
        width: 40%;
      }
      .skeleton-bar.w-full {
        width: 100%;
      }
      .skeleton-bar.h-8 {
        height: 8px;
      }

      /* ── Action Items ─────────────────────────── */

      .action-items-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-top: 20px;
      }

      .btn-generate {
        font-family: inherit;
        font-size: 0.55rem;
        font-weight: 400;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 3px 10px;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
      }

      .btn-generate:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .btn-generate:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .action-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        font-weight: 300;
        line-height: 1.5;
      }

      .action-item input[type="checkbox"] {
        display: none;
      }

      .action-item .checkbox-custom {
        width: 13px;
        height: 13px;
        border: 1.5px solid var(--accent);
        border-radius: 2px;
        background: var(--bg);
        cursor: pointer;
        flex-shrink: 0;
        margin-top: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, border-color 0.15s;
      }

      .action-item .checkbox-custom .tick {
        display: none;
        color: var(--bg);
        font-size: 9px;
        font-weight: 700;
        line-height: 1;
      }

      .action-item.completed .checkbox-custom {
        background: var(--accent);
        border-color: var(--accent);
      }

      .action-item.completed .checkbox-custom .tick {
        display: block;
      }

      .action-item-text {
        color: var(--text);
      }

      .action-item.completed .action-item-text {
        text-decoration: line-through;
        color: var(--text-faded);
      }

      .action-item.completed {
        opacity: 0.5;
      }

      .action-item.follow-up {
        border-left: 2px solid var(--accent);
        padding-left: 8px;
        background: #7c9e8a0d;
      }

      .action-items-empty {
        font-size: 12px;
        color: var(--text-faded);
        font-weight: 300;
        padding: 8px 0;
      }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 0;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-faded);
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-greeting" id="greeting">Good morning, Milette</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div class="header-date" id="headerDate"></div>
        <a href="/archive.html" class="toolkit-link">Archive</a>
        <a href="/toolkit.html" class="toolkit-link">Toolkit</a>
      </div>
    </header>

    <!-- Left: Agenda -->
    <div class="col-agenda">
      <div class="section-label">Today</div>
      <div id="agendaList">
        <div class="skeleton">
          <div class="skeleton-bar w-40"></div>
          <div class="skeleton-bar w-80"></div>
          <div class="skeleton-bar w-60"></div>
        </div>
      </div>

      <div class="action-items-header">
        <div class="section-label">Action Items</div>
        <button class="btn-generate" id="btnGenerate" onclick="generateActionItems()">Generate</button>
      </div>
      <div id="actionItemsList">
        <div class="action-items-empty">Loading...</div>
      </div>
    </div>

    <!-- Centre: Inbox -->
    <div class="col-inbox">
      <div class="col-inbox-header">
        <div class="inbox-header-row">
          <div class="section-label">Inbox</div>
          <button class="btn-refresh" id="btnRefreshEmails" onclick="refreshEmails()">Refresh</button>
        </div>
        <div class="inbox-count" id="inboxSubheading">Loading...</div>
      </div>
      <div class="inbox-list" id="inboxList">
        <div class="skeleton">
          <div class="skeleton-bar w-60"></div>
          <div class="skeleton-bar w-full"></div>
          <div class="skeleton-bar w-80 h-8"></div>
          <div style="height: 8px"></div>
          <div class="skeleton-bar w-40"></div>
          <div class="skeleton-bar w-full"></div>
          <div class="skeleton-bar w-60 h-8"></div>
          <div style="height: 8px"></div>
          <div class="skeleton-bar w-60"></div>
          <div class="skeleton-bar w-80"></div>
          <div class="skeleton-bar w-40 h-8"></div>
        </div>
      </div>
    </div>

    <!-- Right: Chat -->
    <div class="col-chat">
      <div class="col-chat-header">
        <div class="section-label">Ask your PA</div>
        <button class="btn btn-briefing" onclick="morningBriefing()">
          Morning Briefing
        </button>
        <div class="chat-actions">
          <button class="btn btn-small" onclick="refreshData()">
            &#8635; Refresh
          </button>
          <button class="btn btn-small" onclick="resetConversation()">
            + New Chat
          </button>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty">
          Your assistant is ready.<br />Ask anything, or start with a Morning
          Briefing.
        </div>
      </div>
      <div class="typing-indicator" id="typingIndicator">Thinking...</div>
      <div class="chat-input-bar">
        <textarea
          id="chatInput"
          rows="1"
          placeholder="Ask your assistant..."
          onkeydown="handleInputKey(event)"
        ></textarea>
        <button class="btn-send" onclick="sendFromInput()">Send</button>
      </div>
    </div>

    <script>
      // ── State ──────────────────────────────────────
      let emails = [];
      let calendarEvents = [];
      let expandedEmail = null;
      let chatMessages = [];
      let isSending = false;
      let actionItems = [];

      // ── Init ───────────────────────────────────────
      const now = new Date();
      const hour = now.getHours();
      const greetingText =
        hour < 12
          ? "Good morning"
          : hour < 17
            ? "Good afternoon"
            : "Good evening";
      document.getElementById("greeting").textContent =
        greetingText + ", Milette";

      document.getElementById("headerDate").textContent =
        now.toLocaleDateString("en-GB", {
          weekday: "long",
          day: "numeric",
          month: "long",
          year: "numeric",
        });

      marked.setOptions({ breaks: true, gfm: true });
      refreshData();
      fetchActionItems().then(() => generateActionItems());

      // ── Data Fetching ──────────────────────────────
      function refreshData() {
        fetchEmails();
        fetchCalendar();
      }

      async function fetchEmails() {
        const listEl = document.getElementById("inboxList");
        const subEl = document.getElementById("inboxSubheading");
        listEl.innerHTML =
          '<div class="skeleton"><div class="skeleton-bar w-60"></div><div class="skeleton-bar w-full"></div><div class="skeleton-bar w-80 h-8"></div><div style="height:8px"></div><div class="skeleton-bar w-40"></div><div class="skeleton-bar w-full"></div><div class="skeleton-bar w-60 h-8"></div></div>';
        subEl.textContent = "Loading...";
        try {
          const res = await fetch("/api/emails");
          const data = await res.json();
          emails = data.emails || [];
          subEl.textContent =
            emails.length === 0 ? "" : `${emails.length} unread`;
          renderEmails();
        } catch (err) {
          console.error("[fetchEmails] FETCH ERROR:", err);
          listEl.innerHTML =
            '<div class="inbox-empty">Could not load emails. Try the chat.</div>';
          subEl.textContent = "Error";
        }
      }

      async function refreshEmails() {
        const btn = document.getElementById("btnRefreshEmails");
        const subEl = document.getElementById("inboxSubheading");
        btn.textContent = "Refreshing...";
        btn.disabled = true;
        try {
          const res = await fetch("/api/emails/refresh", { method: "POST" });
          const data = await res.json();
          emails = data.emails || [];
          subEl.textContent =
            emails.length === 0 ? "" : `${emails.length} unread`;
          expandedEmail = null;
          renderEmails();
        } catch (err) {
          console.error("[refreshEmails] ERROR:", err);
        } finally {
          btn.textContent = "Refresh";
          btn.disabled = false;
        }
      }

      async function fetchCalendar() {
        const listEl = document.getElementById("agendaList");
        listEl.innerHTML =
          '<div class="skeleton"><div class="skeleton-bar w-40"></div><div class="skeleton-bar w-80"></div><div class="skeleton-bar w-60"></div></div>';
        try {
          const res = await fetch("/api/calendar");
          const data = await res.json();
          calendarEvents = data.events || [];
          renderAgenda();
        } catch (err) {
          console.error("[fetchCalendar] FETCH ERROR:", err);
          listEl.innerHTML =
            '<div class="agenda-empty">Could not load calendar.</div>';
        }
      }

      // ── Action Items ────────────────────────────────
      async function fetchActionItems() {
        try {
          const res = await fetch("/api/action-items");
          const data = await res.json();
          actionItems = data.items || [];
          renderActionItems();
        } catch (err) {
          console.error("[fetchActionItems] ERROR:", err);
        }
      }

      async function generateActionItems() {
        const btn = document.getElementById("btnGenerate");
        btn.textContent = "Generating...";
        btn.disabled = true;
        try {
          const res = await fetch("/api/action-items/generate", { method: "POST" });
          const data = await res.json();
          if (data.items) {
            actionItems = data.items;
            renderActionItems();
          }
        } catch (err) {
          console.error("[generateActionItems] ERROR:", err);
        } finally {
          btn.textContent = "Generate";
          btn.disabled = false;
        }
      }

      function renderActionItems() {
        const el = document.getElementById("actionItemsList");
        if (actionItems.length === 0) {
          el.innerHTML = '<div class="action-items-empty">No action items yet. Hit Generate to extract them from your emails and calendar.</div>';
          return;
        }

        // Sort: follow-ups first, then incomplete, then completed
        const sorted = [...actionItems].sort((a, b) => {
          if (a.source === "calendar" && b.source !== "calendar") return -1;
          if (b.source === "calendar" && a.source !== "calendar") return 1;
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          return 0;
        });

        el.innerHTML = sorted.map(item => {
          const isFollowUp = item.source === "calendar";
          const classes = ["action-item"];
          if (item.completed) classes.push("completed");
          if (isFollowUp) classes.push("follow-up");

          return `
            <div class="${classes.join(" ")}">
              <label class="checkbox-custom" onclick="toggleActionItem('${item.id}', ${!item.completed})">
                <span class="tick">\u2713</span>
              </label>
              <span class="action-item-text">${esc(item.text)}</span>
            </div>
          `;
        }).join("");
      }

      async function toggleActionItem(id, completed) {
        const endpoint = completed ? "complete" : "uncomplete";
        try {
          await fetch(`/api/action-items/${id}/${endpoint}`, { method: "PATCH" });
          const item = actionItems.find(i => i.id === id);
          if (item) {
            item.completed = completed;
            item.completedAt = completed ? new Date().toISOString() : null;
            renderActionItems();
          }
        } catch (err) {
          console.error("[toggleActionItem] ERROR:", err);
          fetchActionItems();
        }
      }

      // ── Render: Agenda ─────────────────────────────
      function renderAgenda() {
        const listEl = document.getElementById("agendaList");
        const today = new Date().toISOString().split("T")[0];

        const todayEvents = calendarEvents.filter(
          (e) => e.start && e.start.split("T")[0] === today,
        );

        if (todayEvents.length === 0) {
          listEl.innerHTML = '<div class="agenda-empty">A clear day.</div>';
          return;
        }

        listEl.innerHTML = todayEvents.map((e) => renderEventCard(e)).join("");
      }

      function renderEventCard(e) {
        const start = new Date(e.start);
        const end = e.end ? new Date(e.end) : null;
        const timeStr = start.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit",
        });
        const endStr = end
          ? end.toLocaleTimeString("en-GB", {
              hour: "2-digit",
              minute: "2-digit",
            })
          : "";
        const location = e.location
          ? `<div class="event-location">${esc(e.location)}</div>`
          : "";

        return `
        <div class="event-card">
          <div class="event-time">${timeStr}${endStr ? " \u2013 " + endStr : ""}</div>
          <div class="event-title">${esc(e.title)}</div>
          ${location}
        </div>
      `;
      }

      // ── Render: Inbox ──────────────────────────────
      function renderEmails() {
        const listEl = document.getElementById("inboxList");

        if (emails.length === 0) {
          listEl.innerHTML = '<div class="inbox-empty">All caught up.</div>';
          return;
        }

        listEl.innerHTML = emails
          .map((email, i) => {
            const isExpanded = expandedEmail === i;
            const unreadDot = !email.isRead
              ? '<span class="email-unread-dot"></span>'
              : "";

            return `
          <div class="email-card" onclick="toggleEmail(${i})">
            <div class="email-card-inner">
              <div class="email-header-row">
                <div class="email-sender">${unreadDot}${esc(email.sender)}</div>
                <div class="email-time">${formatTime(email.time)}</div>
              </div>
              <div class="email-subject">${esc(email.subject)}</div>
              <div class="email-preview">${esc(email.preview || "")}</div>
            </div>
            <div class="email-expanded ${isExpanded ? "visible" : ""}">
              ${isExpanded ? renderRecipients(email, i) : ""}
              ${isExpanded ? renderEmailBody(email, i) : ""}
              <div class="email-actions">
                <button class="btn btn-draft btn-small" onclick="event.stopPropagation(); draftReply(${i})" id="btnDraft${i}">Draft Reply</button>
                <button class="btn btn-mark-read btn-small" onclick="event.stopPropagation(); markAsRead(${i})">Mark as read</button>
              </div>
              <div id="draftBox${i}"></div>
            </div>
          </div>
        `;
          })
          .join("");
      }

      function renderRecipients(email, index) {
        const hasTo = email.to && email.to.length > 0;
        const hasCc = email.cc && email.cc.length > 0;
        if (!hasTo && !hasCc) return "";

        const toStr = hasTo ? `<span class="email-recipients-label">To:</span> ${email.to.map(r => esc(r.name || r.email)).join(", ")}` : "";
        const ccStr = hasCc ? `<span class="email-recipients-label">CC:</span> ${email.cc.map(r => esc(r.name || r.email)).join(", ")}` : "";

        return `
          <button class="email-recipients-toggle" onclick="event.stopPropagation(); toggleRecipients(${index})" id="recipientsToggle${index}">Show recipients \u25BE</button>
          <div class="email-recipients" id="recipientsBox${index}">
            ${toStr}${toStr && ccStr ? "<br>" : ""}${ccStr}
          </div>
        `;
      }

      function toggleRecipients(index) {
        const el = document.getElementById("recipientsBox" + index);
        const btn = document.getElementById("recipientsToggle" + index);
        if (!el || !btn) return;
        const showing = el.classList.toggle("visible");
        btn.textContent = showing ? "Hide recipients \u25B4" : "Show recipients \u25BE";
      }

      function splitThread(text) {
        // Common reply separators in email threads
        const separators = [
          /^-{3,}\s*Original Message\s*-{3,}/im,
          /^_{10,}/m,
          /^From:\s.+/m,
          /^On .{10,} wrote:\s*$/m,
          /^>+\s/m,
        ];
        for (const sep of separators) {
          const match = text.match(sep);
          if (match && match.index > 0) {
            const latest = text.slice(0, match.index).trimEnd();
            const previous = text.slice(match.index).trim();
            if (latest.length > 20 && previous.length > 10) {
              return { latest, previous };
            }
          }
        }
        return { latest: text, previous: null };
      }

      function renderEmailBody(email, index) {
        if (email.bodyType === "html" && email.body) {
          return `<iframe class="email-body-frame" id="emailFrame${index}" sandbox="allow-same-origin" srcdoc="${esc(email.body)}" onload="resizeFrame(this)"></iframe>`;
        }
        const text = email.body || email.preview || "(No content available)";
        const thread = splitThread(text);

        if (!thread.previous) {
          return `<div class="email-expanded-body">${esc(text)}</div>`;
        }

        return `
          <div class="email-expanded-body">${esc(thread.latest)}</div>
          <button class="thread-toggle" onclick="event.stopPropagation(); toggleThread(${index})" id="threadToggle${index}">Show previous messages</button>
          <div class="thread-previous" id="threadPrevious${index}">
            <div class="email-expanded-body">${esc(thread.previous)}</div>
          </div>
        `;
      }

      function toggleThread(index) {
        const el = document.getElementById(`threadPrevious${index}`);
        const btn = document.getElementById(`threadToggle${index}`);
        if (!el || !btn) return;
        const showing = el.classList.toggle("visible");
        btn.textContent = showing ? "Hide previous messages" : "Show previous messages";
      }

      function resizeFrame(frame) {
        try {
          frame.style.height = frame.contentDocument.body.scrollHeight + 20 + "px";
        } catch (e) { /* sandbox restriction */ }
      }

      function toggleEmail(index) {
        expandedEmail = expandedEmail === index ? null : index;
        renderEmails();
      }

      async function draftReply(index) {
        const email = emails[index];
        const box = document.getElementById(`draftBox${index}`);
        const btn = document.getElementById(`btnDraft${index}`);
        if (!box) return;

        // Step 1: Analyse for response options
        btn.disabled = true;
        btn.textContent = "Thinking...";
        box.innerHTML = '<div class="draft-box"><div class="draft-loading">Analysing email...</div></div>';

        try {
          const analyseRes = await fetch(`/api/emails/${encodeURIComponent(email.id)}/analyse`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sender: email.sender,
              senderEmail: email.senderEmail,
              subject: email.subject,
              body: email.body || email.preview,
            }),
          });
          const analyseData = await analyseRes.json();
          const options = analyseData.options || [];

          if (options.length > 0) {
            // Step 2a: Show options
            btn.textContent = "Draft Reply";
            btn.disabled = false;
            showDraftOptions(index, options);
          } else {
            // Step 2b: No options, draft directly
            btn.textContent = "Drafting...";
            box.innerHTML = '<div class="draft-box"><div class="draft-loading">Drafting reply...</div></div>';
            await executeDraft(index);
          }
        } catch (err) {
          box.innerHTML = `<div class="draft-box"><div class="draft-loading">Error: ${esc(err.message)}</div></div>`;
          btn.disabled = false;
          btn.textContent = "Draft Reply";
        }
      }

      function showDraftOptions(index, options) {
        const box = document.getElementById(`draftBox${index}`);
        if (!box) return;

        box.innerHTML = `
          <div class="draft-box" onclick="event.stopPropagation()">
            <div class="draft-options">
              ${options.map(opt => `<button class="btn-option" onclick="event.stopPropagation(); pickDraftOption(${index}, '${esc(opt).replace(/'/g, "\\'")}')">${esc(opt)}</button>`).join("")}
            </div>
            <input type="text" class="draft-custom-input" id="customInstruction${index}" placeholder="Or give your own instruction..." onkeydown="if(event.key==='Enter'){event.stopPropagation(); pickDraftOption(${index}, this.value)}" onclick="event.stopPropagation()" />
          </div>
        `;
      }

      async function pickDraftOption(index, instruction) {
        const box = document.getElementById(`draftBox${index}`);
        const btn = document.getElementById(`btnDraft${index}`);
        if (!box) return;

        btn.disabled = true;
        btn.textContent = "Drafting...";
        box.innerHTML = '<div class="draft-box"><div class="draft-loading">Drafting reply...</div></div>';

        await executeDraft(index, instruction);
      }

      async function executeDraft(index, instruction) {
        const email = emails[index];
        const box = document.getElementById(`draftBox${index}`);
        const btn = document.getElementById(`btnDraft${index}`);

        try {
          const payload = {
            sender: email.sender,
            senderEmail: email.senderEmail,
            subject: email.subject,
            preview: email.body || email.preview,
          };
          if (instruction) payload.instruction = instruction;

          const res = await fetch(`/api/emails/${encodeURIComponent(email.id)}/draft-reply`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();

          if (data.error) {
            box.innerHTML = `<div class="draft-box"><div class="draft-loading">Error: ${esc(data.error)}</div></div>`;
            return;
          }

          showDraftEditor(index, data.draft);
        } catch (err) {
          box.innerHTML = `<div class="draft-box"><div class="draft-loading">Error: ${esc(err.message)}</div></div>`;
        } finally {
          btn.disabled = false;
          btn.textContent = "Draft Reply";
        }
      }

      function showDraftEditor(index, draftText) {
        const box = document.getElementById(`draftBox${index}`);
        if (!box) return;

        box.innerHTML = `
          <div class="draft-box" onclick="event.stopPropagation()">
            <textarea class="draft-textarea" id="draftTextarea${index}">${esc(draftText)}</textarea>
            <div class="draft-actions">
              <button class="btn btn-send-draft btn-small" onclick="event.stopPropagation(); sendDraft(${index})">Send</button>
              <button class="btn btn-regenerate btn-small" onclick="event.stopPropagation(); draftReply(${index})">Regenerate</button>
              <button class="btn-discard" onclick="event.stopPropagation(); discardDraft(${index})">Discard</button>
            </div>
          </div>
        `;
      }

      function discardDraft(index) {
        const box = document.getElementById(`draftBox${index}`);
        if (box) box.innerHTML = "";
      }

      function sendDraft(index) {
        const textarea = document.getElementById(`draftTextarea${index}`);
        if (textarea) {
          console.log("Draft to send:", textarea.value);
          alert("Send feature coming soon");
        }
      }

      // IMPORTANT: requires double confirmation before marking as read
      async function markAsRead(index) {
        const email = emails[index];
        if (!confirm("Mark this email as read? This cannot be undone.")) return;
        try {
          const res = await fetch(`/api/emails/${encodeURIComponent(email.id)}/read`, { method: "POST" });
          const data = await res.json();
          if (data.ok) {
            emails.splice(index, 1);
            expandedEmail = null;
            const subEl = document.getElementById("emailSub");
            subEl.textContent = emails.length === 0 ? "" : `${emails.length} unread`;
            renderEmails();
          } else {
            alert("Failed to mark as read: " + (data.error || "Unknown error"));
          }
        } catch (err) {
          alert("Failed to mark as read: " + err.message);
        }
      }

      // ── Chat ───────────────────────────────────────
      function morningBriefing() {
        sendMessage("Give me my morning briefing.");
      }

      async function resetConversation() {
        try {
          await fetch("/api/reset", { method: "POST" });
        } catch (e) {
          /* ignore */
        }
        chatMessages = [];
        document.getElementById("chatMessages").innerHTML = `
        <div class="chat-empty">
          Your assistant is ready.<br />Ask anything, or start with a Morning Briefing.
        </div>
      `;
      }

      function handleInputKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendFromInput();
        }
      }

      function sendFromInput() {
        const input = document.getElementById("chatInput");
        const msg = input.value.trim();
        if (!msg) return;
        input.value = "";
        input.style.height = "auto";
        sendMessage(msg);
      }

      async function sendMessage(text) {
        if (isSending) return;
        isSending = true;

        const container = document.getElementById("chatMessages");
        if (container.querySelector(".chat-empty")) {
          container.innerHTML = "";
        }

        appendMessage("user", text);
        document.getElementById("typingIndicator").classList.add("visible");

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });
          const data = await res.json();

          if (data.error) {
            appendMessage("assistant", `Something went wrong: ${data.error}`);
          } else {
            appendMessage("assistant", data.response);
          }
        } catch (err) {
          appendMessage("assistant", `Connection error: ${err.message}`);
        } finally {
          document
            .getElementById("typingIndicator")
            .classList.remove("visible");
          isSending = false;
        }
      }

      function appendMessage(role, content) {
        chatMessages.push({ role, content });
        const container = document.getElementById("chatMessages");
        const div = document.createElement("div");
        div.className = `message ${role}`;

        const label = document.createElement("div");
        label.className = "message-label";
        label.textContent = role === "user" ? "You" : "Assistant";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";

        if (role === "assistant") {
          bubble.innerHTML = marked.parse(content);
        } else {
          bubble.textContent = content;
        }

        div.appendChild(label);
        div.appendChild(bubble);
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
      }

      // ── Auto-resize textarea ───────────────────────
      const textarea = document.getElementById("chatInput");
      textarea.addEventListener("input", () => {
        textarea.style.height = "auto";
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + "px";
      });

      // ── Helpers ────────────────────────────────────
      function esc(str) {
        const d = document.createElement("div");
        d.textContent = str || "";
        return d.innerHTML;
      }

      function formatTime(isoStr) {
        if (!isoStr) return "";
        const d = new Date(isoStr);
        const today = new Date();
        if (d.toDateString() === today.toDateString()) {
          return d.toLocaleTimeString("en-GB", {
            hour: "2-digit",
            minute: "2-digit",
          });
        }
        return d.toLocaleDateString("en-GB", {
          day: "numeric",
          month: "short",
        });
      }
    </script>
  </body>
</html>
