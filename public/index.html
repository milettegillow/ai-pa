            <div class="draft-options">
              ${options.map(opt => {
                const label = typeof opt === "string" ? opt : opt.label;
                const isDefault = typeof opt === "object" && opt.isDefault;
                const cls = isDefault ? "btn-option default-option" : "btn-option";
                return `<button class="${cls}" onclick="event.stopPropagation(); pickDraftOption(${index}, '${esc(label).replace(/'/g, "\\'")}')">${esc(label)}</button>`;
              }).join("")}
            </div>
            <input type="text" class="draft-custom-input" id="customInstruction${index}" placeholder="Or give your own instruction..." onkeydown="if(event.key==='Enter'){event.stopPropagation(); pickDraftOption(${index}, this.value)}" onclick="event.stopPropagation()" />
          </div>
        `;
      }

      async function pickDraftOption(index, instruction) {
        const box = document.getElementById(`draftBox${index}`);
        const btn = document.getElementById(`btnDraft${index}`);
        if (!box) return;

        btn.disabled = true;
        btn.textContent = "Drafting...";
        box.innerHTML = '<div class="draft-box"><div class="draft-loading">Drafting reply...</div></div>';

        const additionalLinks = emails[index]._additionalLinks || null;
        await executeDraft(index, instruction, additionalLinks);
      }

      async function executeDraft(index, instruction, additionalLinks) {
        const email = emails[index];
        const box = document.getElementById(`draftBox${index}`);
        const btn = document.getElementById(`btnDraft${index}`);

        try {
          const payload = {
            sender: email.sender,
            senderEmail: email.senderEmail,
            subject: email.subject,
            preview: email.body || email.preview,
            receivedAt: email.time || null,
          };
          if (instruction) payload.instruction = instruction;
          if (additionalLinks?.length) payload.additionalLinks = additionalLinks;

          const res = await fetch(`/api/emails/${encodeURIComponent(email.id)}/draft-reply`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();

          if (data.error) {
            box.innerHTML = `<div class="draft-box"><div class="draft-loading">Error: ${esc(data.error)}</div></div>`;
            return;
          }

          showDraftEditor(index, data.draft);
        } catch (err) {
          box.innerHTML = `<div class="draft-box"><div class="draft-loading">Error: ${esc(err.message)}</div></div>`;
        } finally {
          btn.disabled = false;
          btn.textContent = "Draft Reply";
        }
      }

      function showDraftEditor(index, draftText) {
        const box = document.getElementById(`draftBox${index}`);
        if (!box) return;

        box.innerHTML = `
          <div class="draft-box" onclick="event.stopPropagation()">
            <textarea class="draft-textarea" id="draftTextarea${index}">${esc(draftText)}</textarea>
            <div class="draft-actions">
              <button class="btn btn-send-draft btn-small" onclick="event.stopPropagation(); sendDraft(${index})">Send</button>
              <button class="btn btn-regenerate btn-small" onclick="event.stopPropagation(); draftReply(${index})">Regenerate</button>
              <button class="btn-discard" onclick="event.stopPropagation(); discardDraft(${index})">Discard</button>
            </div>
          </div>
        `;
      }

      function discardDraft(index) {
        const box = document.getElementById(`draftBox${index}`);
        if (box) box.innerHTML = "";
      }

      async function sendDraft(index) {
        const email = emails[index];
        const textarea = document.getElementById(`draftTextarea${index}`);
        const box = document.getElementById(`draftBox${index}`);
        if (!textarea || !box) return;

        const draftText = textarea.value.trim();
        if (!draftText) return;

        // Find the send button and show sending state
        const sendBtn = box.querySelector(".btn-send-draft");
        const regenBtn = box.querySelector(".btn-regenerate");
        const discardBtn = box.querySelector(".btn-discard");
        if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = "Sending..."; }
        if (regenBtn) regenBtn.disabled = true;
        if (discardBtn) discardBtn.disabled = true;
        textarea.disabled = true;

        try {
          const res = await fetch(`/api/emails/${encodeURIComponent(email.id)}/send`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ draftText }),
          });
          const data = await res.json();

          if (data.error) {
            box.innerHTML = `
              <div class="draft-box" onclick="event.stopPropagation()">
                <div class="draft-loading" style="color: #c97070;">Send failed: ${esc(data.error)}</div>
                <textarea class="draft-textarea" id="draftTextarea${index}">${esc(draftText)}</textarea>
                <div class="draft-actions">
                  <button class="btn btn-send-draft btn-small" onclick="event.stopPropagation(); sendDraft(${index})">Retry Send</button>
                  <button class="btn-discard" onclick="event.stopPropagation(); discardDraft(${index})">Discard</button>
                </div>
              </div>
            `;
            return;
          }

          // Success — mark card as replied and show mark-as-read prompt
          email._replied = true;
          const card = document.getElementById(`emailCard${index}`);
          if (card) card.classList.add("replied");

          // Auto-complete quest task if this email is the current quest target
          questAutoCompleteForEmail(email.id);

          box.innerHTML = `
            <div class="draft-box" onclick="event.stopPropagation()">
              <div class="draft-loading" style="color: var(--accent);">Sent!</div>
              <div class="mark-read-prompt" style="margin-top: 8px; font-size: 0.7rem; color: var(--text-muted);">
                Mark as read?
                <button class="btn-option" onclick="event.stopPropagation(); confirmMarkRead(${index})" style="margin-left: 8px;">Yes</button>
                <button class="btn-option" onclick="event.stopPropagation(); dismissMarkRead(${index})" style="margin-left: 4px;">No</button>
              </div>
            </div>
          `;
        } catch (err) {
          box.innerHTML = `
            <div class="draft-box" onclick="event.stopPropagation()">
              <div class="draft-loading" style="color: #c97070;">Send failed: ${esc(err.message)}</div>
              <textarea class="draft-textarea" id="draftTextarea${index}">${esc(draftText)}</textarea>
              <div class="draft-actions">
                <button class="btn btn-send-draft btn-small" onclick="event.stopPropagation(); sendDraft(${index})">Retry Send</button>
                <button class="btn-discard" onclick="event.stopPropagation(); discardDraft(${index})">Discard</button>
              </div>
            </div>
          `;
        }
      }

      async function confirmMarkRead(index) {
        const email = emails[index];
        const box = document.getElementById(`draftBox${index}`);
        const card = document.getElementById(`emailCard${index}`);
        const shouldAdvanceQuest = questState && questState._pendingAdvance;
        try {
          const res = await fetch(`/api/emails/${encodeURIComponent(email.id)}/read`, { method: "POST" });
          const data = await res.json();
          if (data.ok) {
            // Fade out then remove
            if (card) {
              card.classList.add("fade-out");
              await new Promise(r => setTimeout(r, 400));
            }
            emails.splice(index, 1);
            expandedEmail = null;
            const subEl = document.getElementById("inboxSubheading");
            subEl.textContent = emails.length === 0 ? "" : `${emails.length} unread`;
            renderEmails();
          }
        } catch (err) {
          if (box) box.innerHTML = `<div class="draft-box"><div class="draft-loading" style="color: #c97070;">Failed: ${esc(err.message)}</div></div>`;
        }
        if (shouldAdvanceQuest) {
          questState._pendingAdvance = false;
          saveQuestState();
          advanceToNextQuestTask();
        }
      }

      function dismissMarkRead(index) {
        const box = document.getElementById(`draftBox${index}`);
        if (box) box.innerHTML = "";
        if (questState && questState._pendingAdvance) {
          questState._pendingAdvance = false;
          saveQuestState();
          advanceToNextQuestTask();
        }
      }

      // IMPORTANT: requires double confirmation before marking as read
      async function markAsRead(index) {
        const email = emails[index];
        if (!confirm("Mark this email as read? This cannot be undone.")) return;
        try {
          const res = await fetch(`/api/emails/${encodeURIComponent(email.id)}/read`, { method: "POST" });
          const data = await res.json();
          if (data.ok) {
            emails.splice(index, 1);
            expandedEmail = null;
            const subEl = document.getElementById("inboxSubheading");
            subEl.textContent = emails.length === 0 ? "" : `${emails.length} unread`;
            renderEmails();
          } else {
            alert("Failed to mark as read: " + (data.error || "Unknown error"));
          }
        } catch (err) {
          alert("Failed to mark as read: " + err.message);
        }
      }

      // ── Chat ───────────────────────────────────────
      function morningBriefing() {
        sendMessage("Give me my morning briefing.");
      }

      async function resetConversation() {
        try {
          await fetch("/api/reset", { method: "POST" });
        } catch (e) {
          /* ignore */
        }
        chatMessages = [];
        document.getElementById("chatMessages").innerHTML = `
        <div class="chat-empty">
          Your assistant is ready.<br />Ask anything, or start with a Morning Briefing.
        </div>
      `;
      }

      function handleInputKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendFromInput();
        }
      }

      function sendFromInput() {
        const input = document.getElementById("chatInput");
        const msg = input.value.trim();
        if (!msg) return;
        input.value = "";
        input.style.height = "auto";
        sendMessage(msg);
      }

      async function sendMessage(text) {
        if (isSending) return;
        isSending = true;

        const container = document.getElementById("chatMessages");
        if (container.querySelector(".chat-empty")) {
          container.innerHTML = "";
        }

        appendMessage("user", text);
        document.getElementById("typingIndicator").classList.add("visible");

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });
          const data = await res.json();

          if (data.error) {
            appendMessage("assistant", `Something went wrong: ${data.error}`);
          } else {
            appendMessage("assistant", data.response);
          }
        } catch (err) {
          appendMessage("assistant", `Connection error: ${err.message}`);
        } finally {
          document
            .getElementById("typingIndicator")
            .classList.remove("visible");
          isSending = false;
        }
      }

      function appendMessage(role, content) {
        chatMessages.push({ role, content });
        const container = document.getElementById("chatMessages");
        const div = document.createElement("div");
        div.className = `message ${role}`;

        const label = document.createElement("div");
        label.className = "message-label";
        label.textContent = role === "user" ? "You" : "Assistant";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";

        if (role === "assistant") {
          bubble.innerHTML = marked.parse(content);
        } else {
          bubble.textContent = content;
        }

        div.appendChild(label);
        div.appendChild(bubble);
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
      }

      // ── Auto-resize textarea ───────────────────────
      const textarea = document.getElementById("chatInput");
      textarea.addEventListener("input", () => {
        textarea.style.height = "auto";
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + "px";
      });

      // ── Helpers ────────────────────────────────────
      function esc(str) {
        const d = document.createElement("div");
        d.textContent = str || "";
        return d.innerHTML;
      }

      function formatTime(isoStr) {
        if (!isoStr) return "";
        const d = new Date(isoStr);
        const today = new Date();
        if (d.toDateString() === today.toDateString()) {
          return d.toLocaleTimeString("en-GB", {
            hour: "2-digit",
            minute: "2-digit",
          });
        }
        return d.toLocaleDateString("en-GB", {
          day: "numeric",
          month: "short",
        });
      }

      // ── Quest Mode ──────────────────────────────────

      let questState = null; // { quest, currentIndex, completedIds, skippedIds, startTime, emailSubIndex }
      let questHistory = [];
      let questSelectedMinutes = null;
      let questSpotlitEl = null; // currently spotlighted DOM element

      function saveQuestState() {
        if (!questState) {
          localStorage.removeItem('questState');
          return;
        }
        const toSave = {
          quest: questState.quest,
          currentIndex: questState.currentIndex,
          completedIds: [...questState.completedIds],
          skippedIds: [...questState.skippedIds],
          startTime: questState.startTime,
          emailSubIndex: questState.emailSubIndex || 0,
        };
        localStorage.setItem('questState', JSON.stringify(toSave));
      }

      function restoreQuestState() {
        try {
          const saved = localStorage.getItem('questState');
          if (!saved) return;
          const parsed = JSON.parse(saved);
          questState = {
            quest: parsed.quest,
            currentIndex: parsed.currentIndex || 0,
            completedIds: new Set(parsed.completedIds || []),
            skippedIds: new Set(parsed.skippedIds || []),
            startTime: parsed.startTime || Date.now(),
            emailSubIndex: parsed.emailSubIndex || 0,
          };
          // Ensure blocksTaskIds exists on all tasks (backward compat)
          for (const t of questState.quest.tasks || []) {
            if (!t.blocksTaskIds) t.blocksTaskIds = [];
          }
          updateQuestButton();
          // Resume spotlight after emails load
          setTimeout(() => {
            if (questState) enterSpotlightMode();
          }, 2000);
        } catch (e) {
          console.error('[quest] Failed to restore state:', e);
          localStorage.removeItem('questState');
        }
      }

      fetchQuestHistory();
      restoreQuestState();

      async function fetchQuestHistory() {
        try {
          const res = await fetch("/api/quests");
          const data = await res.json();
          questHistory = data.quests || [];
          renderQuestSidebar();
        } catch (err) {
          console.error("[fetchQuestHistory] ERROR:", err);
        }
      }

      function renderQuestSidebar() {
        const el = document.getElementById("questHistory");
        const footer = document.getElementById("questSidebarFooter");
        if (questHistory.length === 0) {
          el.innerHTML = '<div class="section-empty">No quests yet</div>';
          footer.textContent = '';
          return;
        }
        el.innerHTML = questHistory.slice().reverse().map(q => {
          const d = new Date(q.completedAt);
          const dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
          return `<div class="quest-history-item">
            <div class="quest-history-name">${esc(q.name)}</div>
            <div class="quest-history-meta">${dateStr} &middot; ${q.tasksCompleted} tasks &middot; ${q.totalMinutes} min</div>
          </div>`;
        }).join('');
        footer.textContent = `\u26A1 ${questHistory.length} quest${questHistory.length !== 1 ? 's' : ''} completed`;
      }

      // ── Overlay helpers ──

      function openQuestMode() {
        if (questState) {
          // If spotlight is already active, show peek overlay; otherwise enter spotlight
          const tooltipVisible = document.getElementById('questTooltip').classList.contains('visible');
          if (questSpotlitEl || tooltipVisible) {
            exitSpotlightMode();
            openQuestPeek();
          } else {
            enterSpotlightMode();
          }
          return;
        }
        document.getElementById("questOverlay").classList.add("visible");
        renderSetupScreen();
      }

      function closeQuestOverlay() {
        document.getElementById("questOverlay").classList.remove("visible");
      }

      function updateQuestButton() {
        const btn = document.getElementById("btnQuest");
        if (questState) {
          const done = questState.completedIds.size;
          const total = questState.quest.tasks.length;
          const remaining = total - done - questState.skippedIds.size;
          btn.className = 'btn-quest quest-active';
          btn.innerHTML = `\u26A1 Quest Active &middot; ${done} done, ${remaining} to go`;
        } else {
          btn.className = 'btn-quest';
          btn.innerHTML = '\u26A1 Quest Mode';
        }
      }

      // ── Setup Screen ──

      function renderSetupScreen() {
        questSelectedMinutes = null;
        const main = document.getElementById("questMain");
        main.innerHTML = `
          <div class="quest-setup">
            <div class="quest-setup-title">\u26A1 Quest Mode</div>
            <div class="quest-setup-subtitle">How long do you have?</div>
            <div class="quest-time-options">
              <button class="quest-time-btn" onclick="selectQuestTime(15, this)">15 minutes</button>
              <button class="quest-time-btn" onclick="selectQuestTime(30, this)">30 minutes</button>
              <button class="quest-time-btn" onclick="selectQuestTime(60, this)">1 hour</button>
              <button class="quest-time-btn" onclick="selectQuestTime(120, this)">2 hours</button>
              <button class="quest-time-btn" onclick="selectQuestTime(null, this)">I'll go until it's done</button>
            </div>
            <button class="quest-generate-btn" id="btnQuestGenerate" onclick="generateQuest()" disabled>Generate Quest</button>
          </div>
        `;
      }

      function selectQuestTime(minutes, btn) {
        questSelectedMinutes = minutes;
        document.querySelectorAll('.quest-time-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('btnQuestGenerate').disabled = false;
      }

      async function generateQuest() {
        const btn = document.getElementById("btnQuestGenerate");
        btn.disabled = true;
        btn.textContent = "Generating...";

        try {
          const res = await fetch("/api/quest/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ availableMinutes: questSelectedMinutes }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);

          questState = {
            quest: data,
            currentIndex: 0,
            completedIds: new Set(),
            skippedIds: new Set(),
            startTime: Date.now(),
            emailSubIndex: 0,
          };
          saveQuestState();
          updateQuestButton();
          closeQuestOverlay();
          enterSpotlightMode();
        } catch (err) {
          console.error("[generateQuest] ERROR:", err);
          btn.textContent = "Generate Quest";
          btn.disabled = false;
          const errDiv = document.createElement('div');
          errDiv.style.cssText = 'color: #e05252; font-size: 13px; text-align: center; margin-top: 12px;';
          errDiv.textContent = 'Error: ' + err.message;
          document.querySelector('.quest-setup')?.appendChild(errDiv);
        }
      }

      // ── Spotlight Mode ──

      function isTaskBlocked(taskId) {
        if (!questState) return false;
        return questState.quest.tasks.some(t =>
          t.type === 'orientation' &&
          !questState.completedIds.has(t.id) &&
          !questState.skippedIds.has(t.id) &&
          (t.blocksTaskIds || []).includes(taskId)
        );
      }

      function getCurrentQuestTask() {
        if (!questState) return null;
        const tasks = questState.quest.tasks;
        let idx = questState.currentIndex;
        while (idx < tasks.length &&
               (questState.completedIds.has(tasks[idx].id) ||
                questState.skippedIds.has(tasks[idx].id) ||
                isTaskBlocked(tasks[idx].id))) {
          idx++;
        }
        questState.currentIndex = idx;
        return idx < tasks.length ? tasks[idx] : null;
      }

      function findEmailIndex(emailId) {
        if (!emailId) return -1;
        // Exact ID match first
        const exact = emails.findIndex(e => e.id === emailId);
        if (exact >= 0) return exact;
        // Fallback: try matching by subject from quest task context
        // (IDs can change across sessions / re-fetches)
        if (questState) {
          const task = getCurrentQuestTask();
          if (task?.title) {
            const titleLower = task.title.toLowerCase();
            const idx = emails.findIndex(e =>
              e.subject && (titleLower.includes(e.subject.toLowerCase().slice(0, 30)) ||
                            e.subject.toLowerCase().includes(titleLower.slice(0, 30)))
            );
            if (idx >= 0) return idx;
          }
        }
        return -1;
      }

      // Get the relatedEmailIds array (handles both old single and new array format)
      function getTaskEmailIds(task) {
        if (task.relatedEmailIds && task.relatedEmailIds.length) return task.relatedEmailIds;
        if (task.relatedEmailId) return [task.relatedEmailId];
        return [];
      }

      // Get the current email ID for the sub-step we're on
      function getCurrentEmailId(task) {
        const ids = getTaskEmailIds(task);
        const subIdx = questState.emailSubIndex || 0;
        return subIdx < ids.length ? ids[subIdx] : null;
      }

      function spotlightEmailCard(emailId) {
        if (!emailId) return null;
        const emailIdx = findEmailIndex(emailId);
        if (emailIdx < 0) return null;
        // Only re-render if the email isn't already expanded
        if (expandedEmail !== emailIdx) {
          expandedEmail = emailIdx;
          renderEmails();
        }
        // Try exact ID match first, then fall back to the card at the found index
        const el = document.querySelector(`[data-email-id="${emailId}"]`)
                || document.getElementById(`emailCard${emailIdx}`);
        return el || null;
      }

      function getSpotlightTarget(task) {
        const emailIds = getTaskEmailIds(task);

        // Try current email, then auto-advance through remaining emails to find one still in inbox
        if (emailIds.length > 0) {
          let subIdx = questState.emailSubIndex || 0;
          while (subIdx < emailIds.length) {
            const eid = emailIds[subIdx];
            const el = spotlightEmailCard(eid);
            if (el) {
              // Update subIndex if we skipped ahead
              if (subIdx !== (questState.emailSubIndex || 0)) {
                questState.emailSubIndex = subIdx;
                saveQuestState();
              }
              return el;
            }
            subIdx++;
          }
          // All emails in the chain are gone — return null for "all handled" tooltip
          return null;
        }

        // No email associated — fallback targets by type
        if (task.type === 'follow-up') {
          return document.getElementById('followUpsList')?.closest('.sidebar-section');
        }
        if (task.type === 'create-asset' || task.hasBlocker || task.isBlockerFor) {
          return document.getElementById('blockersList')?.closest('.sidebar-section');
        }
        return document.getElementById('actionItemsList')?.closest('.action-items-section');
      }

      async function enterSpotlightMode() {
        const task = getCurrentQuestTask();
        if (!task) {
          exitSpotlightMode();
          renderQuestComplete();
          return;
        }

        // Initialize email sub-index if not set
        if (questState.emailSubIndex === undefined) questState.emailSubIndex = 0;

        // Show dim + pill
        document.getElementById('questSpotlightDim').classList.add('visible');
        updateQuestPill();
        document.getElementById('questPill').classList.add('visible');

        // Spotlight the target and show tooltip immediately
        let target = getSpotlightTarget(task);
        spotlightElement(target);
        showQuestTooltip(task, target);

        // Auto-draft in background (don't block tooltip)
        const currentEmailId = getCurrentEmailId(task);
        const subIdx = questState.emailSubIndex || 0;
        const isFirstEmail = subIdx === 0;

        if (currentEmailId && target) {
          const emailIdx = findEmailIndex(currentEmailId);
          if (emailIdx >= 0) {
            if ((task.type === 'email-reply' && isFirstEmail) ||
                (task.type === 'follow-up' && isFirstEmail)) {
              setTimeout(async () => {
                await draftReply(emailIdx);
                // Re-spotlight after DOM rebuild
                if (questState) {
                  target = getSpotlightTarget(task);
                  spotlightElement(target);
                }
              }, 300);
            }
          }
        }
      }

      function questPillClick() {
        if (!questState) return;
        // If spotlight is active (element spotlit or tooltip visible), open peek overlay
        const tooltipVisible = document.getElementById('questTooltip').classList.contains('visible');
        if (questSpotlitEl || tooltipVisible) {
          exitSpotlightMode();
          openQuestPeek();
        } else {
          enterSpotlightMode();
        }
      }

      function exitSpotlightMode() {
        clearSpotlight();
        document.getElementById('questSpotlightDim').classList.remove('visible');
        // Keep pill visible if quest is still active — user can click to resume
        if (!questState) document.getElementById('questPill').classList.remove('visible');
        document.getElementById('questTooltip').classList.remove('visible');
      }

      function spotlightElement(el) {
        clearSpotlight();
        if (!el) return;
        questSpotlitEl = el;
        el.classList.add('quest-spotlit');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      function clearSpotlight() {
        if (questSpotlitEl) {
          questSpotlitEl.classList.remove('quest-spotlit');
          questSpotlitEl = null;
        }
      }

      function recalculateQuestTime() {
        if (!questState) return 0;
        let remaining = 0;
        for (const t of questState.quest.tasks) {
          if (!questState.completedIds.has(t.id) && !questState.skippedIds.has(t.id)) {
            remaining += (t.estimatedMinutes || 0);
          }
        }
        return remaining;
      }

      function updateQuestPill() {
        if (!questState) return;
        const done = questState.completedIds.size;
        const total = questState.quest.tasks.length;
        const remainingMin = recalculateQuestTime();
        const pill = document.getElementById('questPill');
        pill.textContent = `\u26A1 ${esc(questState.quest.questName)} \u00B7 ${done} of ${total} \u00B7 ~${remainingMin}m left`;
      }

      // ── Tooltip ──

      function showQuestTooltip(task, targetEl) {
        const tooltip = document.getElementById('questTooltip');

        const emailIds = getTaskEmailIds(task);
        const subIdx = questState.emailSubIndex || 0;
        const currentEmailId = getCurrentEmailId(task);
        const hasMoreEmails = subIdx < emailIds.length - 1;
        // For email-reply/follow-up: sub-emails (index > 0) get the generic mark-read flow
        const isSubEmail = (task.type === 'email-reply' || task.type === 'follow-up') && subIdx > 0 && currentEmailId;

        // Type-specific tooltip content
        let instruction = '';
        let actionButtons = '';
        const skipBtn = `<button class="quest-btn-skip" onclick="skipQuestTask('${task.id}')">Skip</button>`;
        const flashSpan = `<span class="quest-tooltip-flash" id="questFlash"></span>`;

        // Shared button fragments
        const doneId = task.id;
        const nextThreadBtn = hasMoreEmails ? `<button class="quest-btn-secondary" onclick="questAdvanceEmail()">Next email in thread \u2192</button>` : '';

        // Orientation task — simple "mark done when ready" flow
        if (task.type === 'orientation') {
          instruction = task.instruction || 'Get context before proceeding';
          const blockedCount = (task.blocksTaskIds || []).length;
          const blockedLabel = blockedCount ? ` (unlocks ${blockedCount} task${blockedCount > 1 ? 's' : ''})` : '';
          actionButtons = `<button class="quest-btn-primary" onclick="completeQuestTask('${doneId}')">Got it \u2713</button>${skipBtn}${flashSpan}`;
          instruction += blockedLabel;
        }
        // Email not found — already read/moved/archived (any task type)
        else if (!targetEl && emailIds.length > 0) {
          instruction = 'Email already read or moved — mark as done?';
          const openLinkBtn = task.url
            ? `<a href="${esc(task.url)}" target="_blank" rel="noopener" class="quest-btn-primary">Open link \u2197</a>`
            : '';
          actionButtons = `${openLinkBtn}<button class="${task.url ? 'quest-btn-outlined' : 'quest-btn-primary'}" onclick="completeQuestTask('${doneId}')">Already done \u2713</button>${skipBtn}${flashSpan}`;
        }
        // Sub-email review for email-reply/follow-up (after the primary draft)
        else if (isSubEmail) {
          const emailCount = emailIds.length > 1 ? ` (${subIdx + 1} of ${emailIds.length})` : '';
          instruction = `Reply if needed, or continue${emailCount}`;
          const doneAction = hasMoreEmails ? `questAdvanceEmail()` : `completeQuestTask('${doneId}')`;
          const doneLabel = hasMoreEmails ? 'Next email in thread \u2192' : 'Done \u2713';
          actionButtons = `<button class="quest-btn-primary" onclick="${doneAction}">${doneLabel}</button>${skipBtn}${flashSpan}`;
        }
        // Primary step logic by type
        else if (task.type === 'email-reply') {
          instruction = 'Review the draft below and hit Send';
          actionButtons = `<button class="quest-btn-outlined" onclick="markDoneButReviewEmails('${doneId}')">Already done \u2713</button>${nextThreadBtn}${skipBtn}${flashSpan}`;
        } else if (task.type === 'follow-up' && currentEmailId) {
          instruction = 'Review the draft below and hit Send';
          actionButtons = `<button class="quest-btn-outlined" onclick="markDoneButReviewEmails('${doneId}')">Already done \u2713</button>${nextThreadBtn}${skipBtn}${flashSpan}`;
        } else if (task.type === 'follow-up') {
          instruction = 'Compose and send the follow-up';
          actionButtons = `<button class="quest-btn-primary" onclick="markDoneButReviewEmails('${doneId}')">Already done \u2713</button>${skipBtn}${flashSpan}`;
        } else if (task.type === 'external-task') {
          instruction = currentEmailId
            ? 'Review email, then complete the task'
            : 'Complete the task and mark done';
          if (task.url) {
            actionButtons = `<a href="${esc(task.url)}" target="_blank" rel="noopener" class="quest-btn-primary">Open link \u2197</a><button class="quest-btn-outlined" onclick="markDoneButReviewEmails('${doneId}')">Already done \u2713</button>${nextThreadBtn}${skipBtn}${flashSpan}`;
          } else {
            actionButtons = `<button class="quest-btn-primary" onclick="markDoneButReviewEmails('${doneId}')">Already done \u2713</button>${nextThreadBtn}${skipBtn}${flashSpan}`;
          }
        } else if (task.type === 'create-asset') {
          instruction = 'Generate content with AI assistance';
          actionButtons = `<button class="quest-btn-primary" onclick="questGenerateWithAI('${doneId}')">Generate with AI \u2192</button><button class="quest-btn-outlined" onclick="markDoneButReviewEmails('${doneId}')">Already done \u2713</button>${skipBtn}${flashSpan}`;
        } else {
          instruction = task.instruction || 'Complete this task';
          actionButtons = `<button class="quest-btn-primary" onclick="markDoneButReviewEmails('${doneId}')">Already done \u2713</button>${skipBtn}${flashSpan}`;
        }

        // Meta actions row (not on orientation tasks)
        const metaActions = task.type !== 'orientation'
          ? `<div class="quest-meta-actions" id="questMetaRow">
              <button class="quest-meta-btn" onclick="showBlockerInput('${doneId}')">\u2298 Add blocker</button>
            </div>`
          : '';

        tooltip.innerHTML = `
          <div class="quest-tooltip-title">${esc(task.title)}</div>
          ${instruction ? `<div class="quest-tooltip-instruction">${instruction}</div>` : ''}
          <div class="quest-tooltip-actions">
            ${actionButtons}
          </div>
          ${metaActions}
        `;

        // Pin tooltip to the top of the right column
        tooltip.classList.remove('arrow-top', 'arrow-bottom');
        tooltip.classList.add('visible');

        // Find the right column and position at its top
        const rightCol = document.querySelector('.col-chat');
        if (rightCol) {
          const colRect = rightCol.getBoundingClientRect();
          const tooltipRect = tooltip.getBoundingClientRect();
          const centerY = colRect.top + (colRect.height - tooltipRect.height) / 2;
          tooltip.style.top = Math.max(colRect.top + 8, centerY) + 'px';
          tooltip.style.left = '';
          tooltip.style.right = '0px';
        } else {
          tooltip.style.top = '50%';
          tooltip.style.transform = 'translateY(-50%)';
          tooltip.style.left = '';
          tooltip.style.right = '0px';
        }
      }

      // ── Peek overlay (checklist view) ──

      // ── "Need context first" inline prompt ──

      function showBlockerInput(taskId) {
        const row = document.getElementById('questMetaRow');
        if (!row) return;
        row.innerHTML = `
          <div class="quest-context-input-wrap" style="width:100%">
            <input class="quest-context-input" id="questBlockerInput" placeholder="What's blocking this?" />
            <button class="quest-btn-primary" onclick="submitBlocker('${taskId}')">Go</button>
          </div>
        `;
        const input = document.getElementById('questBlockerInput');
        if (input) {
          input.focus();
          input.addEventListener('keydown', e => {
            if (e.key === 'Enter') submitBlocker(taskId);
          });
        }
      }

      async function submitBlocker(taskId) {
        const input = document.getElementById('questBlockerInput');
        if (!input || !input.value.trim()) return;
        const text = input.value.trim();
        const task = questState.quest.tasks.find(t => t.id === taskId);
        if (!task) return;

        // Show loading state
        const row = document.getElementById('questMetaRow');
        if (row) row.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.4)">Finding related tasks...</div>';

        // Ask Claude which other tasks share this blocker
        const remainingTasks = questState.quest.tasks.filter(t =>
          !questState.completedIds.has(t.id) && !questState.skippedIds.has(t.id)
        );
        let relatedIds = [];
        try {
          const res = await fetch('/api/quest/related-tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ taskId, contextText: text, tasks: remainingTasks }),
          });
          const data = await res.json();
          relatedIds = data.relatedTaskIds || [];
        } catch (e) {
          console.error('[blocker] Failed to find related tasks:', e);
        }

        // Collect all tasks to remove (current + related)
        const removeIds = new Set([taskId, ...relatedIds]);
        const removedTasks = questState.quest.tasks.filter(t => removeIds.has(t.id));
        const removedTitles = removedTasks.map(t => t.title);

        // Remove them from the quest
        questState.quest.tasks = questState.quest.tasks.filter(t => !removeIds.has(t.id));
        if (questState.currentIndex >= questState.quest.tasks.length) {
          questState.currentIndex = Math.max(0, questState.quest.tasks.length - 1);
        }

        // Create blocker on the server
        try {
          await fetch('/api/follow-ups', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              type: 'blocker',
              name: text,
              task: removedTitles.join(', '),
            }),
          });
          fetchFollowUps();
        } catch (e) {
          console.error('[blocker] Failed to create blocker:', e);
        }

        saveQuestState();
        updateQuestPill();

        // Show confirmation, then advance
        const tooltip = document.getElementById('questTooltip');
        const count = removeIds.size;
        tooltip.innerHTML = `
          <div class="quest-tooltip-title">Blocker added</div>
          <div class="quest-tooltip-instruction">${count} task${count > 1 ? 's' : ''} removed and added to blockers</div>
        `;

        setTimeout(() => {
          if (questState && questState.quest.tasks.length > 0) {
            enterSpotlightMode();
          } else {
            exitSpotlightMode();
            renderQuestComplete();
          }
        }, 2000);
      }

      // ── Peek overlay (checklist view) ──

      function openQuestPeek() {
        if (!questState) return;
        const overlay = document.getElementById("questOverlay");
        overlay.classList.add("visible");

        const main = document.getElementById("questMain");
        const q = questState.quest;
        const tasks = q.tasks;
        const done = questState.completedIds.size;
        const currentTask = getCurrentQuestTask();
        const activeIdx = questState.currentIndex;

        const remainingMin = recalculateQuestTime();
        const checklistHtml = tasks.map((t, i) => {
          const isCompleted = questState.completedIds.has(t.id);
          const isSkipped = questState.skippedIds.has(t.id);
          const isCurrent = i === activeIdx;
          const blocked = isTaskBlocked(t.id);
          let cls = 'quest-task-row';
          if (isCompleted || isSkipped) cls += ' completed';
          else if (blocked) cls += ' locked';
          else if (isCurrent) cls += ' current';
          else cls += ' future';
          const indicator = isCompleted ? '\u2713' : isSkipped ? '\u2013' : blocked ? '\uD83D\uDD12' : isCurrent ? '\u25B6' : '\u2022';
          const badges = [];
          if (t.type === 'orientation') badges.push('<span class="quest-task-badge" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)">context</span>');
          if (t.urgency && t.urgency !== 'none') badges.push(`<span class="quest-task-badge urgency-${t.urgency}">${t.urgency}</span>`);
          if (t.hasBlocker || t.isBlockerFor) badges.push('<span class="quest-task-badge blocker">\u26A0</span>');
          const lockedLabel = blocked ? '<span class="quest-task-locked-label">needs overview first</span>' : '';
          return `<div class="${cls}">
            <span class="quest-task-indicator">${indicator}</span>
            <span class="quest-task-title">${esc(t.title)}</span>
            ${badges.join('')}
            ${lockedLabel}
            <span class="quest-detail-time">~${t.estimatedMinutes}m</span>
          </div>`;
        }).join('');

        main.innerHTML = `
          <div class="quest-header">
            <div class="quest-header-name">\u26A1 ${esc(q.questName)}</div>
            <div class="quest-header-meta">~${remainingMin}m left &middot; ${done} of ${tasks.length} done</div>
          </div>
          <div class="quest-checklist">${checklistHtml}</div>
          <button class="quest-abandon" onclick="abandonQuest()">Abandon Quest</button>
        `;
      }

      // ── Task Completion ──

      async function completeQuestTask(taskId) {
        questState.completedIds.add(taskId);

        // Mark related items complete in background
        const task = questState.quest.tasks.find(t => t.id === taskId);
        if (task?.relatedActionItemId) {
          fetch(`/api/action-items/${task.relatedActionItemId}/complete`, { method: "PATCH" }).catch(() => {});
        }
        if (task?.relatedFollowUpId) {
          fetch(`/api/follow-ups/${task.relatedFollowUpId}/toggle`, { method: "PATCH" }).catch(() => {});
        }

        updateQuestButton();
        updateQuestPill();

        // Show inline "mark as read?" prompt under the email before advancing
        const currentEmailId = task ? getCurrentEmailId(task) : null;
        const emailIdx = currentEmailId ? findEmailIndex(currentEmailId) : -1;
        if (emailIdx >= 0) {
          questState._pendingAdvance = true;
          saveQuestState();
          showInlineMarkReadPrompt(emailIdx);
        } else {
          advanceToNextQuestTask();
        }
      }

      function showInlineMarkReadPrompt(emailIdx) {
        // Hide the tooltip during this transition
        const tooltip = document.getElementById('questTooltip');
        if (tooltip) tooltip.style.display = 'none';

        // Show the mark-as-read prompt inline under the email card
        const box = document.getElementById(`draftBox${emailIdx}`);
        if (box) {
          box.innerHTML = `
            <div class="draft-box" onclick="event.stopPropagation()">
              <div class="mark-read-prompt" style="margin-top: 8px; font-size: 0.7rem; color: var(--text-muted);">
                Mark as read?
                <button class="btn-option" onclick="event.stopPropagation(); confirmMarkRead(${emailIdx})" style="margin-left: 8px;">Yes</button>
                <button class="btn-option" onclick="event.stopPropagation(); dismissMarkRead(${emailIdx})" style="margin-left: 4px;">No</button>
              </div>
            </div>`;
        } else {
          // No draft box available — advance directly
          advanceToNextQuestTask();
        }
      }

      function advanceToNextQuestTask() {
        questState.currentIndex++;
        questState.emailSubIndex = 0;
        saveQuestState();
        setTimeout(() => {
          const nextTask = getCurrentQuestTask();
          if (!nextTask) {
            exitSpotlightMode();
            renderQuestComplete();
          } else {
            enterSpotlightMode();
          }
        }, 400);
      }

      function skipQuestTask(taskId) {
        questState.skippedIds.add(taskId);
        updateQuestButton();
        updateQuestPill();
        advanceToNextQuestTask();
      }

      // ── Quest: Generate with AI (create-asset) ──
      function questGenerateWithAI(taskId) {
        const task = questState?.quest?.tasks?.find(t => t.id === taskId);
        if (!task) return;

        const prompt = `Help me create: ${task.title}. ${task.instruction || ''}`;
        const input = document.getElementById('chatInput');
        if (input) {
          input.value = prompt;
          input.style.height = 'auto';
          input.style.height = input.scrollHeight + 'px';
          input.focus();
          const chatSection = document.querySelector('.chat-section');
          if (chatSection) chatSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        completeQuestTask(taskId);
      }

      // ── Quest: mark task done but still review remaining emails ──
      async function markDoneButReviewEmails(taskId) {
        const task = questState.quest.tasks.find(t => t.id === taskId);
        if (!task) { completeQuestTask(taskId); return; }

        // Mark complete in background
        questState.completedIds.add(taskId);
        if (task.relatedActionItemId) {
          fetch(`/api/action-items/${task.relatedActionItemId}/complete`, { method: "PATCH" }).catch(() => {});
        }
        if (task.relatedFollowUpId) {
          fetch(`/api/follow-ups/${task.relatedFollowUpId}/toggle`, { method: "PATCH" }).catch(() => {});
        }
        updateQuestButton();
        updateQuestPill();

        // If there are more emails to review, switch to sub-email flow
        const emailIds = getTaskEmailIds(task);
        const subIdx = questState.emailSubIndex || 0;
        if (subIdx < emailIds.length - 1) {
          questState.emailSubIndex = subIdx + 1;
          saveQuestState();
          enterSpotlightMode();
        } else {
          // No more emails — show inline mark-as-read prompt before advancing
          const currentEmailId = getCurrentEmailId(task);
          const emailIdx = currentEmailId ? findEmailIndex(currentEmailId) : -1;
          if (emailIdx >= 0) {
            questState._pendingAdvance = true;
            saveQuestState();
            showInlineMarkReadPrompt(emailIdx);
          } else {
            advanceToNextQuestTask();
          }
        }
      }

      // ── Quest: advance to next related email ──
      function questAdvanceEmail() {
        if (!questState) return;
        questState.emailSubIndex = (questState.emailSubIndex || 0) + 1;
        saveQuestState();
        enterSpotlightMode();
      }

      // ── Quest: mark current email as read, then advance ──
      async function questMarkReadAndAdvance() {
        if (!questState) return;
        const task = getCurrentQuestTask();
        if (!task) return;
        const currentEmailId = getCurrentEmailId(task);
        if (currentEmailId) {
          const emailIdx = findEmailIndex(currentEmailId);
          if (emailIdx >= 0) {
            await markAsRead(emailIdx);
          }
        }
        // Check if there are more emails
        const emailIds = getTaskEmailIds(task);
        const subIdx = questState.emailSubIndex || 0;
        if (subIdx < emailIds.length - 1) {
          questAdvanceEmail();
        } else {
          completeQuestTask(task.id);
        }
      }

      // ── Quest: auto-complete on email send ──
      function questAutoCompleteForEmail(emailId) {
        if (!questState) return;
        const task = getCurrentQuestTask();
        if (!task) return;
        const emailIds = getTaskEmailIds(task);
        if (!emailIds.includes(emailId)) return;

        // If there are more emails after the current one, advance to next
        const subIdx = questState.emailSubIndex || 0;
        if (subIdx < emailIds.length - 1) {
          questAdvanceEmail();
        } else {
          completeQuestTask(task.id);
        }
      }

      // ── Quest Complete ──

      async function renderQuestComplete() {
        const q = questState.quest;
        const elapsed = Math.round((Date.now() - questState.startTime) / 60000);
        const done = questState.completedIds.size;

        try {
          await fetch("/api/quest/complete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: q.questName,
              tasksCompleted: done,
              totalMinutes: elapsed,
              completedTaskTitles: q.tasks
                .filter(t => questState.completedIds.has(t.id))
                .map(t => t.title),
              completedEmailSubjects: q.tasks
                .filter(t => questState.completedIds.has(t.id) && t.relatedEmailIds?.length)
                .map(t => t.title),
            }),
          });
          await fetchQuestHistory();
        } catch (err) {
          console.error("[quest/complete] ERROR:", err);
        }

        questState = null;
        saveQuestState();
        updateQuestButton();
        document.getElementById('questPill').classList.remove('visible');

        // Show complete overlay
        const overlay = document.getElementById("questOverlay");
        overlay.classList.add("visible");
        const main = document.getElementById("questMain");
        main.innerHTML = `
          <div class="quest-complete">
            <svg class="quest-seal" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="sealGrad" cx="50%" cy="45%" r="50%">
                  <stop offset="0%" stop-color="#9b3030"/>
                  <stop offset="100%" stop-color="#5a1a1a"/>
                </radialGradient>
              </defs>
              <circle cx="70" cy="70" r="65" fill="url(#sealGrad)" stroke="#7a2222" stroke-width="2"/>
              <circle cx="70" cy="70" r="52" fill="none" stroke="#c0606060" stroke-width="1"/>
              <text x="70" y="62" text-anchor="middle" fill="#e8d0c0" font-family="Outfit" font-size="11" font-weight="600" letter-spacing="0.1em">QUEST</text>
              <text x="70" y="82" text-anchor="middle" fill="#e8d0c0" font-family="Outfit" font-size="11" font-weight="600" letter-spacing="0.1em">COMPLETE</text>
            </svg>
            <div class="quest-complete-title">Quest Complete</div>
            <div class="quest-complete-meta">${esc(q.questName)} &middot; ${done} task${done !== 1 ? 's' : ''} &middot; ${elapsed} min</div>
            <button class="quest-complete-btn" onclick="closeQuest()">Close</button>
          </div>
        `;
      }

      function closeQuest() {
        closeQuestOverlay();
        fetchActionItems();
        fetchFollowUps();
      }

      function abandonQuest() {
        questState = null;
        exitSpotlightMode();
        saveQuestState();
        updateQuestButton();
        closeQuestOverlay();
        fetchActionItems();
        fetchFollowUps();
      }
    </script>

    <!-- Quest: Setup/Peek/Complete overlay -->
    <div class="quest-overlay" id="questOverlay">
      <div class="quest-panel">
        <button class="quest-close" onclick="closeQuestOverlay()">&times;</button>
        <div class="quest-main" id="questMain"></div>
        <div class="quest-sidebar" id="questSidebar">
          <div class="quest-sidebar-title">Past Quests</div>
          <div class="quest-history" id="questHistory">
            <div class="section-empty">No quests yet</div>
          </div>
          <div class="quest-sidebar-footer" id="questSidebarFooter"></div>
        </div>
      </div>
    </div>

    <!-- Quest: Spotlight dim -->
    <div class="quest-spotlight-dim" id="questSpotlightDim"></div>

    <!-- Quest: Progress pill -->
    <div class="quest-pill" id="questPill" onclick="questPillClick()"></div>

    <!-- Quest: Tooltip -->
    <div class="quest-tooltip" id="questTooltip"></div>
  </body>
</html>
