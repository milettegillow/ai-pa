<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="/ai-pa-favicon.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Assistant</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #1e1e1a;
        --bg-card: #232320;
        --border: #2a2a24;
        --bg-header: #191916;
        --accent: #7c9e8a;
        --accent-secondary: #a8c5bc;
        --text: #e8f0ec;
        --text-muted: #a8c5bc;
        --text-faded: #555;
        --user-bubble-bg: #243028;
        --user-bubble-border: #7c9e8a;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Outfit", sans-serif;
        font-weight: 300;
        font-size: 22px;
        line-height: 1.6;
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
        grid-template-columns: 25% 45% 30%;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Header ──────────────────────────────────── */

      .header {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: var(--bg-header);
        border-bottom: 1px solid var(--border);
      }

      .header-greeting {
        font-weight: 300;
        font-style: italic;
        font-size: 1rem;
        color: var(--text);
      }

      .header-date {
        font-weight: 400;
        font-size: 0.58rem;
        color: var(--text-faded);
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }

      .toolkit-link {
        font-size: 0.55rem;
        font-weight: 400;
        color: var(--muted);
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px 12px;
        transition: color 0.15s, border-color 0.15s;
      }

      .toolkit-link:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .btn-quest {
        font-family: "Outfit", sans-serif;
        font-size: 0.55rem;
        font-weight: 500;
        color: var(--accent);
        background: transparent;
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 4px 12px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-quest:hover {
        background: rgba(124, 158, 138, 0.1);
      }

      .btn-quest.quest-active {
        background: #8b2020;
        border-color: #c04040;
        color: #fff;
        animation: quest-pulse 2s ease-in-out infinite;
      }

      @keyframes quest-pulse {
        0%, 100% { box-shadow: 0 0 4px rgba(192, 64, 64, 0.3); }
        50% { box-shadow: 0 0 12px rgba(192, 64, 64, 0.6); }
      }

      /* ── Section Labels ──────────────────────────── */

      .section-label {
        font-size: 1.1rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: var(--accent);
        margin-bottom: 8px;
      }

      /* ── Left Column: Agenda ─────────────────────── */

      .col-agenda {
        padding: 16px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .agenda-fixed {
        flex: 0 0 33%;
        min-height: 0;
        overflow-y: auto;
      }

      .action-items-section {
        flex: 0 0 50%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: 16px 16px 8px;
        border-bottom: 1px solid var(--border);
        overflow: hidden;
      }

      .action-items-scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }

      .agenda-date {
        display: none;
      }

      .event-card {
        border-left: 2px solid var(--accent);
        background: var(--bg-card);
        padding: 12px 14px;
        margin-bottom: 8px;
        border-top: 1px solid var(--border);
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        border-radius: 0 2px 2px 0;
      }

      .event-time {
        font-size: 0.58rem;
        font-weight: 500;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin-bottom: 2px;
      }

      .event-title {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
      }

      .event-location {
        font-size: 12px;
        font-weight: 300;
        color: var(--text-faded);
        margin-top: 2px;
      }

      .agenda-empty {
        font-weight: 300;
        color: var(--text-faded);
        font-size: 0.8rem;
        margin-top: 4px;
      }

      .agenda-loading {
        color: var(--text-faded);
        font-size: 13px;
        font-weight: 300;
      }

      .agenda-section-divider {
        font-size: 0.58rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--text-faded);
        margin-top: 20px;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
      }

      /* ── Centre Column: Inbox ────────────────────── */

      .col-inbox {
        background: #242421;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .col-inbox-header {
        padding: 16px 16px 0;
      }

      .inbox-header-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .btn-refresh {
        font-size: 0.6rem;
        font-weight: 400;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 3px 10px;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
      }

      .btn-refresh:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .btn-refresh:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .inbox-count {
        font-size: 12px;
        font-weight: 300;
        color: var(--text-faded);
        margin-bottom: 4px;
      }

      .inbox-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 16px 16px;
      }

      .email-card {
        padding: 16px 0;
        margin-bottom: 4px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }

      .email-card.replied {
        background: rgba(125, 155, 118, 0.12);
        border-radius: 6px;
        padding: 16px 12px;
        position: relative;
      }

      .email-card.replied .email-card-inner::after {
        content: "✓ Replied";
        position: absolute;
        top: 16px;
        right: 12px;
        font-size: 10px;
        font-weight: 500;
        color: var(--accent);
        letter-spacing: 0.02em;
      }

      .email-card.replied .email-expanded {
        background: var(--bg);
        border-radius: 4px;
      }

      .email-card.fade-out {
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .email-card-inner {
        padding: 0;
      }

      .email-header-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 2px;
      }

      .email-card.replied .email-header-row {
        padding-right: 70px;
      }

      .email-sender {
        font-weight: 500;
        font-size: 14px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .email-unread-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }

      .email-time {
        font-size: 11px;
        font-weight: 300;
        color: var(--text-faded);
        white-space: nowrap;
      }

      .email-subject {
        font-size: 13px;
        font-weight: 300;
        color: var(--accent);
        margin-bottom: 4px;
      }

      .email-preview {
        font-size: 12px;
        font-weight: 300;
        color: var(--text-faded);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.5;
      }

      .email-expanded {
        display: none;
        margin-top: 12px;
        padding: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 2px;
      }

      .email-expanded.visible {
        display: block;
      }

      .email-expanded-body {
        font-size: 13px;
        font-weight: 300;
        line-height: 1.75;
        white-space: pre-wrap;
        color: var(--text);
        margin-bottom: 14px;
      }

      .email-body-frame {
        width: 100%;
        border: none;
        border-radius: 6px;
        background: #fff;
        margin-bottom: 14px;
        min-height: 80px;
      }

      .email-recipients-toggle {
        font-size: 11px;
        font-weight: 300;
        color: var(--text-faded);
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        font-family: inherit;
        margin-bottom: 8px;
        display: inline-block;
      }

      .email-recipients-toggle:hover {
        color: var(--muted);
      }

      .email-recipients {
        display: none;
        font-size: 11px;
        font-weight: 300;
        color: var(--text-faded);
        margin-bottom: 10px;
        line-height: 1.6;
      }

      .email-recipients.visible {
        display: block;
      }

      .email-recipients-label {
        color: var(--muted);
        font-weight: 400;
      }

      .draft-options {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .btn-option {
        font-family: inherit;
        font-size: 0.6rem;
        font-weight: 400;
        color: var(--text-muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 5px 12px;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }

      .btn-option:hover {
        color: var(--text);
        border-color: var(--accent);
        background: #7c9e8a0d;
      }

      .btn-option.default-option {
        background: rgba(125, 155, 118, 0.25);
        color: var(--text);
      }

      .draft-custom-input {
        width: 100%;
        font-family: inherit;
        font-size: 12px;
        font-weight: 300;
        color: var(--text);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 10px;
        margin-bottom: 10px;
        outline: none;
      }

      .draft-custom-input::placeholder {
        color: var(--text-faded);
      }

      .draft-custom-input:focus {
        border-color: var(--accent);
      }

      .thread-toggle {
        font-family: inherit;
        font-size: 0.6rem;
        font-weight: 400;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px 12px;
        cursor: pointer;
        margin-bottom: 14px;
        transition: color 0.15s, border-color 0.15s;
      }

      .thread-toggle:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .thread-previous {
        display: none;
        border-top: 1px solid var(--border);
        padding-top: 12px;
        margin-bottom: 14px;
      }

      .thread-previous.visible {
        display: block;
      }

      .thread-previous .email-expanded-body {
        color: var(--text-faded);
      }

      .inbox-empty {
        font-weight: 300;
        color: var(--text-faded);
        font-size: 0.8rem;
      }

      .inbox-loading {
        color: var(--text-faded);
        font-size: 13px;
        font-weight: 300;
        padding: 8px 0;
      }

      /* ── Right Column: Chat ──────────────────────── */

      .col-chat {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .chat-section {
        flex: 0 0 67%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding-bottom: 4px;
        border-top: 1px solid var(--border);
      }

      .sidebar-section {
        flex: 0 0 25%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        border-top: 1px solid var(--border);
        padding: 12px 16px 8px;
        overflow: hidden;
      }

      .sidebar-section-header {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 0 0 8px;
      }

      .sidebar-section-header .sidebar-section-label {
        padding: 0;
      }

      .sidebar-section-label {
        flex-shrink: 0;
        padding: 0 0 8px;
      }

      .sidebar-section-content {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .col-chat-header {
        flex-shrink: 0;
        padding: 16px 16px 12px;
      }

      .chat-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }

      .btn {
        font-family: "Outfit", sans-serif;
        font-size: 0.68rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        padding: 8px 16px;
        border: 1px solid var(--accent);
        border-radius: 12px;
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        transition: all 0.15s ease;
        white-space: nowrap;
      }

      .btn:hover {
        background: var(--accent);
        color: var(--bg);
      }

      .btn-briefing {
        width: 100%;
        display: block;
        background: #7c9e8a33;
        border-color: transparent;
      }

      .btn-briefing:hover {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }

      .btn-send {
        font-family: "Outfit", sans-serif;
        font-size: 0.68rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: 12px;
        padding: 10px 18px;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-send:hover {
        background: var(--accent-secondary);
      }

      .btn-small {
        font-size: 0.62rem;
        padding: 6px 12px;
      }

      .btn-draft {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }

      .btn-draft:hover {
        background: var(--accent-secondary);
      }

      .btn-mark-read {
        background: transparent;
        color: var(--muted);
        border-color: var(--border);
      }

      .btn-mark-read:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .email-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .draft-box {
        margin-top: 10px;
        border-top: 1px solid var(--border);
        padding-top: 10px;
      }

      .draft-loading {
        font-size: 0.7rem;
        color: var(--muted);
        padding: 8px 0;
      }

      .draft-textarea {
        width: 100%;
        min-height: 100px;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        font-family: inherit;
        font-size: 0.7rem;
        line-height: 1.5;
        resize: vertical;
        box-sizing: border-box;
      }

      .draft-textarea:focus {
        outline: none;
        border-color: var(--accent);
      }

      .draft-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }

      .btn-send-draft {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }

      .btn-send-draft:hover {
        background: var(--accent-secondary);
      }

      .btn-regenerate {
        background: transparent;
        color: var(--text);
        border-color: var(--border);
      }

      .btn-regenerate:hover {
        border-color: var(--muted);
      }

      .btn-discard {
        background: transparent;
        color: var(--muted);
        border: none;
        font-size: 0.58rem;
        padding: 4px 8px;
        cursor: pointer;
      }

      .btn-discard:hover {
        color: var(--text);
      }

      .chat-messages {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 8px 16px 16px;
      }

      .chat-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-faded);
        font-weight: 300;
        font-size: 13px;
        text-align: center;
        padding: 24px;
        line-height: 1.7;
      }

      .message {
        max-width: 88%;
        margin-bottom: 12px;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        margin-left: auto;
      }

      .message-label {
        font-size: 0.54rem;
        font-weight: 500;
        color: var(--text-faded);
        margin-bottom: 3px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }

      .message.user .message-label {
        text-align: right;
      }

      .message-bubble {
        padding: 10px 14px;
        border-radius: 2px;
        font-size: 13px;
        font-weight: 300;
        line-height: 1.65;
      }

      .message.user .message-bubble {
        background: var(--user-bubble-bg);
        border: 1px solid var(--user-bubble-border);
        color: var(--text);
      }

      .message.assistant .message-bubble {
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text);
      }

      .message.assistant .message-bubble p {
        margin-bottom: 8px;
      }
      .message.assistant .message-bubble p:last-child {
        margin-bottom: 0;
      }
      .message.assistant .message-bubble strong {
        color: var(--accent);
        font-weight: 500;
      }
      .message.assistant .message-bubble ul,
      .message.assistant .message-bubble ol {
        padding-left: 18px;
        margin-bottom: 8px;
      }
      .message.assistant .message-bubble li {
        margin-bottom: 3px;
      }
      .message.assistant .message-bubble code {
        background: var(--bg);
        padding: 1px 5px;
        border-radius: 0;
        font-size: 12px;
      }
      .message.assistant .message-bubble pre {
        background: var(--bg);
        padding: 10px;
        border-radius: 0;
        overflow-x: auto;
        margin-bottom: 8px;
      }

      .typing-indicator {
        display: none;
        padding: 6px 16px;
        color: var(--text-faded);
        font-weight: 300;
        font-size: 12px;
      }

      .typing-indicator.visible {
        display: block;
      }

      /* ── Chat Input ──────────────────────────────── */

      .chat-input-bar {
        display: flex;
        gap: 8px;
        padding: 12px 16px 16px;
        border-top: 1px solid var(--border);
      }

      .chat-input-bar textarea {
        flex: 1;
        font-family: "Outfit", sans-serif;
        font-weight: 300;
        font-size: 13px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--bg-card);
        color: var(--text);
        resize: none;
        outline: none;
        line-height: 1.5;
        max-height: 100px;
      }

      .chat-input-bar textarea::placeholder {
        color: var(--text-faded);
      }
      .chat-input-bar textarea:focus {
        border-color: var(--accent);
      }

      /* ── Scrollbar ────────────────────────────────── */

      /* ── Skeleton Shimmer Loader ─────────────────── */

      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }

      .skeleton {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .skeleton-bar {
        height: 12px;
        border-radius: 6px;
        background: linear-gradient(
          90deg,
          var(--border) 25%,
          #3a3a34 50%,
          var(--border) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }

      .skeleton-bar.w-60 {
        width: 60%;
      }
      .skeleton-bar.w-80 {
        width: 80%;
      }
      .skeleton-bar.w-40 {
        width: 40%;
      }
      .skeleton-bar.w-full {
        width: 100%;
      }
      .skeleton-bar.h-8 {
        height: 8px;
      }

      /* ── Action Items ─────────────────────────── */

      .action-items-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-top: 20px;
      }

      .btn-generate {
        font-family: inherit;
        font-size: 0.55rem;
        font-weight: 400;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 3px 10px;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
      }

      .btn-generate:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .btn-generate:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .action-item {
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 24px 8px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        font-weight: 300;
        line-height: 1.5;
      }

      .action-item input[type="checkbox"] {
        display: none;
      }

      .action-item .checkbox-custom {
        width: 13px;
        height: 13px;
        border: 1.5px solid var(--accent);
        border-radius: 2px;
        background: var(--bg);
        cursor: pointer;
        flex-shrink: 0;
        margin-top: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, border-color 0.15s;
      }

      .action-item .checkbox-custom .tick {
        display: none;
        color: var(--bg);
        font-size: 9px;
        font-weight: 700;
        line-height: 1;
      }

      .action-item.completed .checkbox-custom {
        background: var(--accent);
        border-color: var(--accent);
      }

      .action-item.completed .checkbox-custom .tick {
        display: block;
      }

      .action-item-text {
        color: var(--text);
      }

      .action-item.completed .action-item-text {
        text-decoration: line-through;
        color: var(--text-faded);
      }

      .action-item.completed {
        opacity: 0.5;
      }

      .action-item.follow-up {
        border-left: 2px solid var(--accent);
        padding-left: 8px;
        background: #7c9e8a0d;
      }

      .action-item.urgency-red {
        border-left: 3px solid #e05252;
        padding-left: 8px;
      }

      .action-item.urgency-orange {
        border-left: 3px solid #e0a050;
        padding-left: 8px;
      }

      .action-item.urgency-yellow {
        border-left: 3px solid #d4c455;
        padding-left: 8px;
      }

      .btn-edit-item {
        position: absolute;
        right: 4px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-faded);
        cursor: pointer;
        font-size: 12px;
        padding: 4px 6px;
        opacity: 0;
        transition: opacity 0.15s;
      }

      .action-item:hover .btn-edit-item,
      .sidebar-item:hover .btn-edit-item {
        opacity: 1;
      }

      .btn-edit-item:hover {
        color: var(--text-main);
      }

      .action-items-empty {
        font-size: 12px;
        color: var(--text-faded);
        font-weight: 300;
        padding: 8px 0;
      }

      .sidebar-item {
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 13px;
        color: var(--text-main);
        padding: 12px 28px 12px 8px;
        border-left: 3px solid transparent;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.02);
      }

      .sidebar-item.sidebar-completed {
        opacity: 0.5;
      }

      .sidebar-item.sidebar-completed .sidebar-item-text {
        text-decoration: line-through;
      }

      .sidebar-item .checkbox-custom {
        width: 13px;
        height: 13px;
        min-width: 13px;
        border: 1.5px solid var(--accent);
        border-radius: 2px;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        margin-top: 2px;
      }

      .sidebar-item .checkbox-custom .tick {
        display: none;
        color: var(--bg);
        font-size: 9px;
        font-weight: 700;
        line-height: 1;
      }

      .sidebar-item.sidebar-completed .checkbox-custom {
        background: var(--accent);
        border-color: var(--accent);
      }

      .sidebar-item.sidebar-completed .checkbox-custom .tick {
        display: block;
      }

      .sidebar-urgency-red { border-left-color: #e05252; }
      .sidebar-urgency-orange { border-left-color: #e0a050; }
      .sidebar-urgency-yellow { border-left-color: #d4c455; }

      .sidebar-item-text {
        flex: 1;
        line-height: 1.4;
      }

      .sidebar-task {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .sidebar-date {
        font-size: 13px;
        font-weight: 500;
      }

      .sidebar-date-default { color: var(--text-muted); }
      .sidebar-date-yellow { color: #d4c455; }
      .sidebar-date-orange { color: #e0a050; }
      .sidebar-date-red { color: #e05252; }

      .subsection-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 6px 0 2px;
        margin-top: 4px;
      }

      .subsection-label:first-child {
        margin-top: 0;
      }

      .confidence-badge {
        font-size: 10px;
        padding: 1px 5px;
        border-radius: 8px;
        font-weight: 500;
        vertical-align: middle;
      }

      .confidence-likely {
        background: rgba(212, 196, 85, 0.2);
        color: #d4c455;
      }

      .confidence-maybe {
        background: rgba(168, 197, 188, 0.15);
        color: var(--text-muted);
      }

      .section-empty {
        font-size: 12px;
        color: var(--text-faded);
        font-weight: 300;
        font-style: italic;
        padding: 6px 0;
      }

      .blocker-confirm {
        background: rgba(125, 155, 118, 0.08);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        margin-bottom: 4px;
      }

      .blocker-confirm-count {
        font-size: 11px;
        color: var(--text-faded);
        margin-bottom: 4px;
      }

      .blocker-confirm-text {
        font-size: 13px;
        color: var(--text-main);
        margin-bottom: 8px;
        line-height: 1.4;
      }

      .blocker-confirm-actions {
        display: flex;
        gap: 6px;
      }

      .blocker-status {
        font-size: 12px;
        color: var(--accent);
        padding: 6px 0;
      }

      /* ── Quest Mode ──────────────────────────────── */

      /* Setup/Peek/Complete overlay (centred modal) */
      .quest-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1100;
        background: rgba(10, 10, 8, 0.85);
        backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
      }
      .quest-overlay.visible { display: flex; }

      .quest-panel {
        position: relative;
        width: 90vw;
        max-width: 1100px;
        height: 80vh;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        display: flex;
        overflow: hidden;
      }
      .quest-close {
        position: absolute;
        top: 12px;
        right: 16px;
        background: none;
        border: none;
        color: var(--text-faded);
        font-size: 24px;
        cursor: pointer;
        z-index: 2;
        line-height: 1;
      }
      .quest-close:hover { color: var(--text); }

      .quest-main {
        flex: 7;
        padding: 32px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .quest-sidebar {
        flex: 3;
        border-left: 1px solid var(--border);
        padding: 24px;
        display: flex;
        flex-direction: column;
        background: var(--bg);
      }
      .quest-sidebar-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 16px;
      }
      .quest-history {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .quest-history-item {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
      }
      .quest-history-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }
      .quest-history-meta {
        font-size: 11px;
        color: var(--text-faded);
        margin-top: 2px;
      }
      .quest-sidebar-footer {
        flex-shrink: 0;
        font-size: 11px;
        color: var(--text-faded);
        padding-top: 12px;
        border-top: 1px solid var(--border);
        margin-top: 12px;
      }

      /* Setup screen */
      .quest-setup {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
      }
      .quest-setup-title { font-size: 20px; font-weight: 500; color: var(--text); }
      .quest-setup-subtitle { font-size: 14px; color: var(--text-muted); margin-top: -12px; }
      .quest-time-options { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
      .quest-time-btn {
        font-family: "Outfit", sans-serif;
        font-size: 13px; font-weight: 400;
        padding: 10px 20px;
        border: 1px solid var(--border); border-radius: 8px;
        background: transparent; color: var(--text);
        cursor: pointer; transition: all 0.15s;
      }
      .quest-time-btn:hover { border-color: var(--accent); color: var(--accent); }
      .quest-time-btn.selected { border-color: var(--accent); background: rgba(124,158,138,0.12); color: var(--accent); }
      .quest-generate-btn {
        font-family: "Outfit", sans-serif;
        font-size: 14px; font-weight: 500;
        padding: 12px 32px; border: none; border-radius: 10px;
        background: var(--accent); color: var(--bg);
        cursor: pointer; transition: opacity 0.15s;
      }
      .quest-generate-btn:hover { opacity: 0.85; }
      .quest-generate-btn:disabled { opacity: 0.4; cursor: default; }

      /* Spotlight dim overlay */
      .quest-spotlight-dim {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 900;
        background: rgba(10, 10, 8, 0.5);
        pointer-events: none;
      }
      .quest-spotlight-dim.visible { display: block; }

      /* Spotlighted element */
      .quest-spotlit {
        position: relative !important;
        z-index: 950 !important;
        box-shadow: 0 0 0 4px var(--accent), 0 0 30px rgba(124, 158, 138, 0.25);
        border-radius: 4px;
        transition: box-shadow 0.3s;
        pointer-events: auto;
      }

      /* Progress pill */
      .quest-pill {
        display: none;
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1050;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 6px 18px;
        font-family: "Outfit", sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: var(--accent);
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        transition: background 0.15s;
      }
      .quest-pill.visible { display: block; }
      .quest-pill:hover { background: var(--bg); }

      /* Tooltip */
      .quest-tooltip {
        display: none;
        position: fixed;
        z-index: 1000;
        background: #1a1a1a;
        border: 2px solid var(--accent);
        border-radius: 8px;
        padding: 10px 16px;
        box-shadow: 0 0 12px rgba(124, 158, 138, 0.3), 0 0 30px rgba(124, 158, 138, 0.1), 0 4px 20px rgba(0,0,0,0.6);
        pointer-events: auto;
        /* Pinned to top of right column */
        right: 0;
        width: 30%;
        box-sizing: border-box;
      }
      .quest-tooltip.visible { display: block; }

      .quest-tooltip-title {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
      }
      .quest-tooltip-instruction {
        font-size: 11px;
        color: rgba(255,255,255,0.45);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
        margin-bottom: 6px;
      }
      .quest-tooltip-actions {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .quest-tooltip-flash {
        font-size: 11px;
        font-weight: 500;
        color: var(--accent);
        opacity: 0;
        transition: opacity 0.3s;
        margin-left: 4px;
      }
      .quest-tooltip-flash.visible { opacity: 1; }

      /* Primary action button — sage green, prominent */
      .quest-btn-primary {
        font-family: "Outfit", sans-serif;
        font-size: 11px; font-weight: 600;
        padding: 5px 14px; border: none; border-radius: 6px;
        background: var(--accent); color: var(--bg);
        cursor: pointer; transition: opacity 0.15s;
        white-space: nowrap;
        text-decoration: none; display: inline-block; text-align: center;
      }
      .quest-btn-primary:hover { opacity: 0.85; }

      /* Outlined action — white border, prominent secondary */
      .quest-btn-outlined {
        font-family: "Outfit", sans-serif;
        font-size: 11px; font-weight: 500;
        padding: 5px 14px; border: 1px solid rgba(255,255,255,0.35); border-radius: 6px;
        background: transparent; color: rgba(255,255,255,0.85);
        cursor: pointer; transition: all 0.15s;
        white-space: nowrap;
        text-decoration: none; display: inline-block; text-align: center;
      }
      .quest-btn-outlined:hover { border-color: rgba(255,255,255,0.6); color: #fff; }

      /* Muted text action — no background, no border */
      .quest-btn-secondary {
        font-family: "Outfit", sans-serif;
        font-size: 11px; font-weight: 400;
        padding: 4px 6px; border: none; border-radius: 4px;
        background: transparent; color: rgba(255,255,255,0.4);
        cursor: pointer; transition: color 0.15s;
        white-space: nowrap;
      }
      .quest-btn-secondary:hover { color: rgba(255,255,255,0.75); }

      /* Skip — smallest, most muted, pushed right */
      .quest-btn-skip {
        font-family: "Outfit", sans-serif;
        font-size: 10px; font-weight: 400;
        padding: 4px 6px; border: none; border-radius: 4px;
        background: transparent; color: rgba(255,255,255,0.25);
        cursor: pointer; transition: color 0.15s;
        margin-left: auto; white-space: nowrap;
      }
      .quest-btn-skip:hover { color: rgba(255,255,255,0.5); }

      /* Tooltip arrow (hidden when pinned to right column) */
      .quest-tooltip::before { display: none; }

      /* Locked/blocked task in checklist */
      .quest-task-row.locked { opacity: 0.3; }
      .quest-task-locked-label {
        font-size: 10px; color: rgba(255,255,255,0.3);
        font-style: italic; margin-left: auto;
      }

      /* Context/blocker action row */
      .quest-meta-actions {
        display: flex; gap: 12px; margin-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.06);
        padding-top: 6px;
      }
      .quest-meta-btn {
        font-family: "Outfit", sans-serif;
        font-size: 11px; font-weight: 400;
        color: rgba(255,255,255,0.4);
        cursor: pointer; background: none; border: none;
        padding: 2px 0; transition: color 0.15s;
      }
      .quest-meta-btn:hover { color: rgba(255,255,255,0.7); }
      .quest-context-input-wrap {
        display: flex; gap: 4px; margin-top: 6px;
      }
      .quest-context-input {
        flex: 1; font-family: "Outfit", sans-serif;
        font-size: 11px; padding: 5px 10px;
        border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
        background: rgba(255,255,255,0.05); color: #fff;
        outline: none;
      }
      .quest-context-input:focus { border-color: rgba(255,255,255,0.4); }

      /* Peek overlay checklist (reused in peek modal) */
      .quest-checklist { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; flex-shrink: 0; }
      .quest-task-row {
        display: flex; align-items: center; gap: 10px;
        padding: 6px 10px; border-radius: 6px;
        font-size: 13px; transition: background 0.15s;
      }
      .quest-task-row.current { background: rgba(124,158,138,0.1); border-left: 3px solid var(--accent); }
      .quest-task-row.completed { opacity: 0.4; }
      .quest-task-row.completed .quest-task-title { text-decoration: line-through; }
      .quest-task-row.future { opacity: 0.6; }
      .quest-task-indicator { width: 18px; font-size: 12px; text-align: center; flex-shrink: 0; }
      .quest-task-title { flex: 1; }
      .quest-task-badge { font-size: 10px; padding: 2px 6px; border-radius: 6px; flex-shrink: 0; }
      .quest-task-badge.urgency-red { background: rgba(224,82,82,0.15); color: #e05252; }
      .quest-task-badge.urgency-orange { background: rgba(224,160,80,0.15); color: #e0a050; }
      .quest-task-badge.urgency-yellow { background: rgba(212,196,85,0.15); color: #d4c455; }
      .quest-task-badge.blocker { background: rgba(212,196,85,0.15); color: #d4c455; }
      .quest-detail-time { font-size: 12px; color: var(--text-faded); }
      .quest-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 20px; flex-shrink: 0; }
      .quest-header-name { font-size: 20px; font-weight: 500; color: var(--accent); }
      .quest-header-meta { font-size: 13px; color: var(--text-faded); }
      .quest-abandon {
        font-size: 11px; color: var(--text-faded); text-decoration: underline;
        cursor: pointer; background: none; border: none;
        font-family: "Outfit", sans-serif; margin-top: 12px; align-self: flex-start;
      }
      .quest-abandon:hover { color: var(--text-muted); }

      /* Complete screen */
      .quest-complete {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px;
      }
      .quest-seal { width: 140px; height: 140px; }
      .quest-complete-title { font-size: 22px; font-weight: 500; color: var(--text); }
      .quest-complete-meta { font-size: 14px; color: var(--text-muted); }
      .quest-complete-btn {
        font-family: "Outfit", sans-serif;
        font-size: 14px; font-weight: 500;
        padding: 10px 28px;
        border: 1px solid var(--border); border-radius: 8px;
        background: transparent; color: var(--text);
        cursor: pointer; margin-top: 8px;
      }
      .quest-complete-btn:hover { border-color: var(--text-faded); }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 0;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-faded);
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-greeting" id="greeting">Good morning, Milette</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div class="header-date" id="headerDate"></div>
        <button class="btn-quest" id="btnQuest" onclick="openQuestMode()">&#9889; Quest Mode</button>
        <a href="/archive.html" class="toolkit-link">Archive</a>
        <a href="/toolkit.html" class="toolkit-link">Toolkit</a>
      </div>
    </header>

    <!-- Left: Agenda -->
    <div class="col-agenda">
      <div class="agenda-fixed">
        <div class="section-label">Today</div>
        <div id="agendaList">
          <div class="skeleton">
            <div class="skeleton-bar w-40"></div>
            <div class="skeleton-bar w-80"></div>
            <div class="skeleton-bar w-60"></div>
          </div>
        </div>
      </div>

      <div class="chat-section">
        <div class="col-chat-header">
          <div class="section-label">Ask your PA</div>
          <button class="btn btn-briefing" onclick="morningBriefing()">
            Morning Briefing
          </button>
          <div class="chat-actions">
            <button class="btn btn-small" onclick="refreshData()">
              &#8635; Refresh
            </button>
            <button class="btn btn-small" onclick="resetConversation()">
              + New Chat
            </button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="chat-empty">
            Your assistant is ready.<br />Ask anything, or start with a Morning
            Briefing.
          </div>
        </div>
        <div class="typing-indicator" id="typingIndicator">Thinking...</div>
        <div class="chat-input-bar">
          <textarea
            id="chatInput"
            rows="1"
            placeholder="Ask your assistant..."
            onkeydown="handleInputKey(event)"
          ></textarea>
          <button class="btn-send" onclick="sendFromInput()">Send</button>
        </div>
      </div>
    </div>

    <!-- Centre: Inbox -->
    <div class="col-inbox">
      <div class="col-inbox-header">
        <div class="inbox-header-row">
          <div class="section-label">Inbox</div>
          <button class="btn-refresh" id="btnRefreshEmails" onclick="refreshEmails()">Refresh</button>
        </div>
        <div class="inbox-count" id="inboxSubheading">Loading...</div>
      </div>
      <div class="inbox-list" id="inboxList">
        <div class="skeleton">
          <div class="skeleton-bar w-60"></div>
          <div class="skeleton-bar w-full"></div>
          <div class="skeleton-bar w-80 h-8"></div>
          <div style="height: 8px"></div>
          <div class="skeleton-bar w-40"></div>
          <div class="skeleton-bar w-full"></div>
          <div class="skeleton-bar w-60 h-8"></div>
          <div style="height: 8px"></div>
          <div class="skeleton-bar w-60"></div>
          <div class="skeleton-bar w-80"></div>
          <div class="skeleton-bar w-40 h-8"></div>
        </div>
      </div>
    </div>

    <!-- Right: Action Items + Follow-ups + Blockers -->
    <div class="col-chat">
      <div class="action-items-section">
        <div class="action-items-header">
          <div class="section-label">Action Items</div>
          <button class="btn-generate" id="btnGenerate" onclick="generateActionItems()">Generate</button>
        </div>
        <div class="action-items-scroll" id="actionItemsList">
          <div class="action-items-empty">Loading...</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <div class="section-label sidebar-section-label">Follow-ups</div>
          <button class="btn-generate" id="btnRegenFollowUps" onclick="regenerateFollowUps()">Regenerate</button>
        </div>
        <div class="sidebar-section-content" id="followUpsList">
          <div class="section-empty">Loading...</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <div class="section-label sidebar-section-label">Blockers</div>
          <button class="btn-generate" id="btnRegenBlockers" onclick="regenerateBlockers()">Regenerate</button>
        </div>
        <div class="sidebar-section-content" id="blockersList">
          <div class="section-empty">Loading...</div>
        </div>
      </div>
    </div>

    <script>
      // ── State ──────────────────────────────────────
      let emails = [];
      let calendarEvents = [];
      let expandedEmail = null;
      let chatMessages = [];
      let isSending = false;
      let actionItems = [];
      let followUps = [];
      let blockers = [];

      // ── Init ───────────────────────────────────────
      const now = new Date();
      const hour = now.getHours();
      const greetingText =
        hour < 12
          ? "Good morning"
          : hour < 17
            ? "Good afternoon"
            : "Good evening";

      // ── Action Items ────────────────────────────────
      async function fetchActionItems() {

      async function generateActionItems() {
        const btn = document.getElementById("btnGenerate");
        btn.textContent = "Generating...";
        btn.disabled = true;
        try {
          const res = await fetch("/api/action-items/generate", { method: "POST" });
          const data = await res.json();
          if (data.items) {
            actionItems = data.items;
            renderActionItems();
          }
        } catch (err) {
          console.error("[generateActionItems] ERROR:", err);
        } finally {
          btn.textContent = "Generate";
          btn.disabled = false;
        }
      }

      function getUrgencyLevel(item) {
        // Returns: 0 = red (overdue), 1 = orange (past ideal), 2 = yellow (due today), 3 = none
        if (item.completed) return 3;
        const ref = item.receivedAt || item.createdAt;
        if (!ref) return 3;
        const ageMs = Date.now() - new Date(ref).getTime();
        const ageHours = ageMs / (1000 * 60 * 60);

        const isIntro = item.isIntro || false;
        const isPostCall = item.source === "calendar";

        let idealH, hardH;
        if (isIntro || isPostCall) {
          idealH = 2; hardH = 24;
        } else {
          idealH = 24; hardH = 120; // 5 working days
        }

        if (ageHours >= hardH) return 0; // red — overdue
        if (ageHours >= idealH) return 1; // orange — past ideal
        // "Due today" — within ideal window but received today
        const receivedDate = new Date(ref).toDateString();
        const todayDate = new Date().toDateString();
        if (receivedDate === todayDate) return 2; // yellow — due today
        if (ageHours < idealH) return 2; // yellow — still within ideal
        return 3;
      }

      function renderActionItems() {
        const el = document.getElementById("actionItemsList");
        if (actionItems.length === 0) {
          el.innerHTML = '<div class="action-items-empty">No action items yet. Hit Generate to extract them from your emails and calendar.</div>';
          return;
        }

        // Diagnostic: log urgency computation per item
        console.group('[Urgency Diagnostics]');
        actionItems.forEach(item => {
          if (item.completed) return;
          const ref = item.receivedAt || item.createdAt;
          const ageMs = ref ? Date.now() - new Date(ref).getTime() : 0;
          const ageHours = ageMs / (1000 * 60 * 60);
          const level = getUrgencyLevel(item);
          const levelLabel = ['RED', 'ORANGE', 'YELLOW', 'NONE'][level];
          console.log(
            `${levelLabel} | age: ${ageHours.toFixed(1)}h | receivedAt: ${item.receivedAt || 'NULL'} | createdAt: ${item.createdAt} | isIntro: ${item.isIntro || false} | source: ${item.source} | "${item.text.slice(0, 60)}..."`
          );
        });
        console.groupEnd();

        // Compute urgency for each item
        const withUrgency = actionItems.map(item => ({
          ...item,
          _urgency: getUrgencyLevel(item),
        }));

        // Sort: by urgency (red first), then follow-ups, then incomplete before completed
        withUrgency.sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          if (a._urgency !== b._urgency) return a._urgency - b._urgency;
          if (a.source === "calendar" && b.source !== "calendar") return -1;
          if (b.source === "calendar" && a.source !== "calendar") return 1;
          return 0;
        });

        el.innerHTML = withUrgency.map(item => {
          const isFollowUp = item.source === "calendar";
          const classes = ["action-item"];
          if (item.completed) classes.push("completed");
          if (isFollowUp) classes.push("follow-up");
          if (!item.completed) {
            if (item._urgency === 0) classes.push("urgency-red");
            else if (item._urgency === 1) classes.push("urgency-orange");
            else if (item._urgency === 2) classes.push("urgency-yellow");
          }

          return `
            <div class="${classes.join(" ")}">
              <label class="checkbox-custom" onclick="toggleActionItem('${item.id}', ${!item.completed})">
                <span class="tick">\u2713</span>
              </label>
              <span class="action-item-text">${esc(item.text)}</span>
              <button class="btn-edit-item" onclick="editActionItem('${item.id}')" title="Edit">&#9998;</button>
            </div>
          `;
        }).join("");
      }

      async function toggleActionItem(id, completed) {
        const endpoint = completed ? "complete" : "uncomplete";
        try {
          await fetch(`/api/action-items/${id}/${endpoint}`, { method: "PATCH" });
          const item = actionItems.find(i => i.id === id);
          if (item) {
            item.completed = completed;
            item.completedAt = completed ? new Date().toISOString() : null;
            renderActionItems();
          }
        } catch (err) {
          console.error("[toggleActionItem] ERROR:", err);
          fetchActionItems();
        }
      }

      // ── Follow-ups & Blockers ─────────────────────
      async function fetchFollowUps() {
        try {
          const res = await fetch("/api/follow-ups");
          const data = await res.json();
          followUps = data.followUps || [];
          blockers = data.blockers || [];
          renderFollowUps();
          renderBlockers();
        } catch (err) {
          console.error("[fetchFollowUps] ERROR:", err);
        }
      }

      function getDateUrgency(dueDate) {
        // Returns: 0 = red (overdue), 1 = orange (due within 24h), 2 = yellow (due within 3 days), 3 = none
        if (!dueDate) return 3;
        const now = new Date();
        const due = new Date(dueDate + 'T23:59:59');
        const diffMs = due - now;
        const diffHours = diffMs / (1000 * 60 * 60);
        if (diffHours < 0) return 0;       // overdue
        if (diffHours < 24) return 1;      // due within 24h
        if (diffHours < 72) return 2;      // due within 3 days
        return 3;                          // plenty of time
      }

      function formatDueDate(dueDate) {
        if (!dueDate) return '';
        const d = new Date(dueDate + 'T00:00:00');
        const day = d.getDate();
        const month = d.toLocaleDateString('en-GB', { month: 'short' });
        return `${day} ${month}`;
      }

      function renderFollowUpItem(item) {
        const text = item.text || item.name || '';
        const urgency = item.completed ? 3 : getDateUrgency(item.dueDate);
        const urgencyClass = !item.completed && urgency < 3
          ? ` sidebar-urgency-${['red', 'orange', 'yellow'][urgency]}`
          : '';
        const completedClass = item.completed ? ' sidebar-completed' : '';
        const dateStr = formatDueDate(item.dueDate);
        const dateUrgency = getDateUrgency(item.dueDate);
        const dateColorClass = dateStr
          ? ` sidebar-date-${['red', 'orange', 'yellow', 'default'][dateUrgency]}`
          : '';
        const confidenceBadge = item.confidence && item.confidence !== 'definite'
          ? ` <span class="confidence-badge confidence-${item.confidence}">${item.confidence}</span>`
          : '';

        return `
          <div class="sidebar-item${urgencyClass}${completedClass}">
            <label class="checkbox-custom" onclick="toggleFollowUp('${item.id}')">
              <span class="tick">&#10003;</span>
            </label>
            <span class="sidebar-item-text">
              ${esc(text)}${confidenceBadge}${dateStr ? ` <span class="sidebar-date${dateColorClass}">[${dateStr}]</span>` : ''}
            </span>
            <button class="btn-edit-item" onclick="editFollowUp('${item.id}')" title="Edit">&#9998;</button>
          </div>
        `;
      }

      function renderFollowUps() {
        const el = document.getElementById("followUpsList");
        if (followUps.length === 0) {
          el.innerHTML = '<div class="section-empty">Nothing yet</div>';
          return;
        }

        const postCall = followUps.filter(i => i.type === 'post-call');
        const awaiting = followUps.filter(i => i.type === 'awaiting-reply');
        // Items without a type go under post-call
        const other = followUps.filter(i => !i.type || (i.type !== 'post-call' && i.type !== 'awaiting-reply'));

        let html = '';
        const allPostCall = [...postCall, ...other];
        if (allPostCall.length > 0) {
          html += `<div class="subsection-label">\u{1F4DE} Post-call</div>`;
          html += allPostCall.map(renderFollowUpItem).join('');
        }
        if (awaiting.length > 0) {
          html += `<div class="subsection-label">\u{1F4E7} Awaiting reply</div>`;
          html += awaiting.map(renderFollowUpItem).join('');
        }
        el.innerHTML = html;
      }

      function renderBlockers() {
        const el = document.getElementById("blockersList");
        if (blockers.length === 0) {
          el.innerHTML = '<div class="section-empty">Nothing yet</div>';
          return;
        }

        el.innerHTML = blockers.map(item => {
          const urgency = item.completed ? 3 : getDateUrgency(item.dueDate);
          const urgencyClass = !item.completed && urgency < 3
            ? ` sidebar-urgency-${['red', 'orange', 'yellow'][urgency]}`
            : '';
          const completedClass = item.completed ? ' sidebar-completed' : '';
          const dateStr = formatDueDate(item.dueDate);
          const dateUrgency = getDateUrgency(item.dueDate);
          const dateColorClass = dateStr
            ? ` sidebar-date-${['red', 'orange', 'yellow', 'default'][dateUrgency]}`
            : '';

          return `
            <div class="sidebar-item${urgencyClass}${completedClass}">
              <label class="checkbox-custom" onclick="toggleFollowUp('${item.id}')">
                <span class="tick">&#10003;</span>
              </label>
              <span class="sidebar-item-text">
                ${esc(item.name)}${dateStr ? ` <span class="sidebar-date${dateColorClass}">[${dateStr}]</span>` : ''}
                <span class="sidebar-task">${esc(item.task)}</span>
              </span>
              <button class="btn-edit-item" onclick="editFollowUp('${item.id}')" title="Edit">&#9998;</button>
            </div>
          `;
        }).join("");
      }

      async function toggleFollowUp(id) {
        try {
          await fetch(`/api/follow-ups/${id}/toggle`, { method: "PATCH" });
          // Update local state
          const fu = followUps.find(i => i.id === id);
          const bl = blockers.find(i => i.id === id);
          const item = fu || bl;
          if (item) {
            item.completed = !item.completed;
            item.completedAt = item.completed ? new Date().toISOString() : null;
          }
          renderFollowUps();
          renderBlockers();
        } catch (err) {
          console.error("[toggleFollowUp] ERROR:", err);
          fetchFollowUps();
        }
      }

      // ── Blocker generation ─────────────────────────
      async function regenerateBlockers() {
        const btn = document.getElementById("btnRegenBlockers");
        const el = document.getElementById("blockersList");
        btn.disabled = true;
        btn.textContent = "Thinking...";

        try {
          const res = await fetch("/api/blockers/generate", { method: "POST" });
          const data = await res.json();
          if (data.error) throw new Error(data.error);

          const suggestions = data.suggestions || [];
          if (suggestions.length === 0) {
            btn.textContent = "Regenerate";
            btn.disabled = false;
            showBlockerStatus("No new blockers found.");
            return;
          }

          btn.textContent = "Reviewing...";
          await reviewBlockerSuggestions(suggestions);
        } catch (err) {
          console.error("[regenerateBlockers] ERROR:", err);
          showBlockerStatus("Error: " + err.message);
        } finally {
          btn.textContent = "Regenerate";
          btn.disabled = false;
        }
      }

      async function reviewBlockerSuggestions(suggestions) {
        let added = 0;
        for (let i = 0; i < suggestions.length; i++) {
          const s = suggestions[i];
          const accepted = await showBlockerConfirm(s.text, i + 1, suggestions.length);
          if (accepted) {
            try {
              const res = await fetch("/api/follow-ups", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ type: "blocker", name: s.text, task: s.impliedBy || "" }),
              });
              const data = await res.json();
              if (data.item) {
                blockers.push(data.item);
                renderBlockers();
                added++;
              }
            } catch (err) {
              console.error("[addBlocker] ERROR:", err);
            }
          }
        }
        showBlockerStatus(`Done — ${added} blocker${added !== 1 ? 's' : ''} added.`);
      }

      function showBlockerConfirm(text, current, total) {
        return new Promise(resolve => {
          const el = document.getElementById("blockersList");
          const confirmHtml = `
            <div class="blocker-confirm">
              <div class="blocker-confirm-count">${current} of ${total}</div>
              <div class="blocker-confirm-text">Add blocker: "${esc(text)}"?</div>
              <div class="blocker-confirm-actions">
                <button class="btn-option" onclick="this.closest('.blocker-confirm').dataset.result='add'">&#10003; Add</button>
                <button class="btn-option" onclick="this.closest('.blocker-confirm').dataset.result='skip'" style="margin-left:4px">&#10007; Skip</button>
              </div>
            </div>
          `;
          // Prepend the confirmation prompt
          const wrapper = document.createElement('div');
          wrapper.innerHTML = confirmHtml;
          const confirmEl = wrapper.firstElementChild;
          el.prepend(confirmEl);
          el.scrollTop = 0;

          // Listen for button clicks
          confirmEl.addEventListener('click', (e) => {
            if (confirmEl.dataset.result) {
              const accepted = confirmEl.dataset.result === 'add';
              confirmEl.remove();
              resolve(accepted);
            }
          });
        });
      }

      function showBlockerStatus(msg) {
        const el = document.getElementById("blockersList");
        const statusEl = document.createElement('div');
        statusEl.className = 'blocker-status';
        statusEl.textContent = msg;
        el.prepend(statusEl);
        setTimeout(() => statusEl.remove(), 3000);
      }

      // ── Follow-up generation ─────────────────────
      async function regenerateFollowUps() {
        const btn = document.getElementById("btnRegenFollowUps");
        btn.disabled = true;
        btn.textContent = "Thinking...";

        try {
          const res = await fetch("/api/followups/generate", { method: "POST" });
          const data = await res.json();
          if (data.error) throw new Error(data.error);

          const suggestions = data.suggestions || [];
          if (suggestions.length === 0) {
            btn.textContent = "Regenerate";
            btn.disabled = false;
            showFollowUpStatus("No new follow-ups found.");
            return;
          }

          btn.textContent = "Reviewing...";
          await reviewFollowUpSuggestions(suggestions);
        } catch (err) {
          console.error("[regenerateFollowUps] ERROR:", err);
          showFollowUpStatus("Error: " + err.message);
        } finally {
          btn.textContent = "Regenerate";
          btn.disabled = false;
        }
      }

      async function reviewFollowUpSuggestions(suggestions) {
        let added = 0;
        for (let i = 0; i < suggestions.length; i++) {
          const s = suggestions[i];
          const typeLabel = s.type === 'awaiting-reply' ? '\u{1F4E7}' : '\u{1F4DE}';
          const confLabel = s.confidence ? ` (${s.confidence})` : '';
          const accepted = await showFollowUpConfirm(
            `${typeLabel} ${s.text}${confLabel}`,
            i + 1,
            suggestions.length
          );
          if (accepted) {
            try {
              const res = await fetch("/api/follow-ups", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  type: "follow-up",
                  followUpType: s.type || 'post-call',
                  text: s.text,
                  recipientEmail: s.recipientEmail || '',
                  confidence: s.confidence || null,
                  dueDate: s.dueDate || null,
                }),
              });
              const data = await res.json();
              if (data.item) {
                followUps.push(data.item);
                renderFollowUps();
                added++;
              }
            } catch (err) {
              console.error("[addFollowUp] ERROR:", err);
            }
          }
        }
        showFollowUpStatus(`Done \u2014 ${added} follow-up${added !== 1 ? 's' : ''} added.`);
      }

      function showFollowUpConfirm(text, current, total) {
        return new Promise(resolve => {
          const el = document.getElementById("followUpsList");
          const confirmHtml = `
            <div class="blocker-confirm">
              <div class="blocker-confirm-count">${current} of ${total}</div>
              <div class="blocker-confirm-text">Add: "${esc(text)}"?</div>
              <div class="blocker-confirm-actions">
                <button class="btn-option" onclick="this.closest('.blocker-confirm').dataset.result='add'">\u2713 Add</button>
                <button class="btn-option" onclick="this.closest('.blocker-confirm').dataset.result='skip'" style="margin-left:4px">\u2717 Skip</button>
              </div>
            </div>
          `;
          const wrapper = document.createElement('div');
          wrapper.innerHTML = confirmHtml;
          const confirmEl = wrapper.firstElementChild;
          el.prepend(confirmEl);
          el.scrollTop = 0;

          confirmEl.addEventListener('click', (e) => {
            if (confirmEl.dataset.result) {
              const accepted = confirmEl.dataset.result === 'add';
              confirmEl.remove();
              resolve(accepted);
            }
          });
        });
      }

      function showFollowUpStatus(msg) {
        const el = document.getElementById("followUpsList");
        const statusEl = document.createElement('div');
        statusEl.className = 'blocker-status';
        statusEl.textContent = msg;
        el.prepend(statusEl);
        setTimeout(() => statusEl.remove(), 3000);
      }

      // ── Inline editing ───────────────────────────
      function editActionItem(id) {
        const item = actionItems.find(i => i.id === id);
        if (!item) return;
        const newText = prompt("Edit action item:", item.text);
        if (newText === null || newText.trim() === '' || newText.trim() === item.text) return;
        fetch(`/api/action-items/${id}/text`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: newText.trim() }),
        }).then(() => {
          item.text = newText.trim();
          renderActionItems();
        }).catch(err => {
          console.error('[editActionItem] ERROR:', err);
        });
      }

      function editFollowUp(id) {
        const fu = followUps.find(i => i.id === id);
        const bl = blockers.find(i => i.id === id);
        const item = fu || bl;
        if (!item) return;

        const isBlocker = !!bl;
        if (isBlocker) {
          // Blockers use name: task format
          const currentDisplay = item.task ? `${item.name}: ${item.task}` : item.name;
          const newText = prompt("Edit blocker:", currentDisplay);
          if (newText === null || newText.trim() === '' || newText.trim() === currentDisplay) return;
          let name, task;
          const colonIdx = newText.indexOf(':');
          if (colonIdx > 0) {
            name = newText.slice(0, colonIdx).trim();
            task = newText.slice(colonIdx + 1).trim();
          } else {
            name = newText.trim();
            task = item.task;
          }
          fetch(`/api/follow-ups/${id}/text`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, task }),
          }).then(() => {
            item.name = name;
            item.task = task;
            renderBlockers();
          }).catch(err => console.error('[editFollowUp] ERROR:', err));
        } else {
          // Follow-ups use text field
          const currentText = item.text || item.name || '';
          const newText = prompt("Edit follow-up:", currentText);
          if (newText === null || newText.trim() === '' || newText.trim() === currentText) return;
          fetch(`/api/follow-ups/${id}/text`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: newText.trim() }),
          }).then(() => {
            item.text = newText.trim();
            renderFollowUps();
          }).catch(err => console.error('[editFollowUp] ERROR:', err));
        }
      }

      // ── Render: Agenda ─────────────────────────────
      function renderAgenda() {
        const listEl = document.getElementById("agendaList");
        const today = new Date().toISOString().split("T")[0];

        const todayEvents = calendarEvents.filter(
          (e) => e.start && e.start.split("T")[0] === today,
        );

        if (todayEvents.length === 0) {
          listEl.innerHTML = '<div class="agenda-empty">A clear day.</div>';
          return;
        }

        listEl.innerHTML = todayEvents.map((e) => renderEventCard(e)).join("");
      }

      function renderEventCard(e) {
        const start = new Date(e.start);
        const end = e.end ? new Date(e.end) : null;
        const timeStr = start.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit",
        });
        const endStr = end
          ? end.toLocaleTimeString("en-GB", {
              hour: "2-digit",
              minute: "2-digit",
            })
          : "";
        const location = e.location
          ? `<div class="event-location">${esc(e.location)}</div>`
          : "";

        return `
        <div class="event-card">
          <div class="event-time">${timeStr}${endStr ? " \u2013 " + endStr : ""}</div>
          <div class="event-title">${esc(e.title)}</div>
          ${location}
        </div>
      `;
      }

      // ── Render: Inbox ──────────────────────────────
      function renderEmails() {
        const listEl = document.getElementById("inboxList");

        if (emails.length === 0) {
          listEl.innerHTML = '<div class="inbox-empty">All caught up.</div>';
          return;
        }

        listEl.innerHTML = emails
          .map((email, i) => {
            const isExpanded = expandedEmail === i;
            const unreadDot = !email.isRead
              ? '<span class="email-unread-dot"></span>'
              : "";

            const repliedClass = email._replied ? " replied" : "";

            return `
          <div class="email-card${repliedClass}" id="emailCard${i}" data-email-id="${email.id}" onclick="toggleEmail(${i})">
            <div class="email-card-inner">
              <div class="email-header-row">
                <div class="email-sender">${unreadDot}${esc(email.sender)}</div>
                <div class="email-time">${formatTime(email.time)}</div>
              </div>
              <div class="email-subject">${esc(email.subject)}</div>
              <div class="email-preview">${esc(email.preview || "")}</div>
            </div>
            <div class="email-expanded ${isExpanded ? "visible" : ""}" onclick="event.stopPropagation()">
              ${isExpanded ? renderRecipients(email, i) : ""}
              ${isExpanded ? renderEmailBody(email, i) : ""}
              <div class="email-actions">
                <button class="btn btn-draft btn-small" onclick="event.stopPropagation(); draftReply(${i})" id="btnDraft${i}">Draft Reply</button>
                <button class="btn btn-mark-read btn-small" onclick="event.stopPropagation(); markAsRead(${i})">Mark as read</button>
              </div>
              <div id="draftBox${i}"></div>
            </div>
          </div>
        `;
          })
          .join("");
      }

      function renderRecipients(email, index) {
        const hasTo = email.to && email.to.length > 0;
        const hasCc = email.cc && email.cc.length > 0;
        if (!hasTo && !hasCc) return "";

        const toStr = hasTo ? `<span class="email-recipients-label">To:</span> ${email.to.map(r => esc(r.name || r.email)).join(", ")}` : "";
        const ccStr = hasCc ? `<span class="email-recipients-label">CC:</span> ${email.cc.map(r => esc(r.name || r.email)).join(", ")}` : "";

        return `
          <button class="email-recipients-toggle" onclick="event.stopPropagation(); toggleRecipients(${index})" id="recipientsToggle${index}">Show recipients \u25BE</button>
          <div class="email-recipients" id="recipientsBox${index}">
            ${toStr}${toStr && ccStr ? "<br>" : ""}${ccStr}
          </div>
        `;
      }

      function toggleRecipients(index) {
        const el = document.getElementById("recipientsBox" + index);
        const btn = document.getElementById("recipientsToggle" + index);
        if (!el || !btn) return;
        const showing = el.classList.toggle("visible");
        btn.textContent = showing ? "Hide recipients \u25B4" : "Show recipients \u25BE";
      }

      function splitThread(text) {
        // Common reply separators in email threads
        const separators = [
          /^-{3,}\s*Original Message\s*-{3,}/im,
          /^_{10,}/m,
          /^From:\s.+/m,
          /^On .{10,} wrote:\s*$/m,
          /^>+\s/m,
        ];
        for (const sep of separators) {
          const match = text.match(sep);
          if (match && match.index > 0) {
            const latest = text.slice(0, match.index).trimEnd();
            const previous = text.slice(match.index).trim();
            if (latest.length > 20 && previous.length > 10) {
              return { latest, previous };
            }
          }
        }
        return { latest: text, previous: null };
      }

      function renderEmailBody(email, index) {
        if (email.bodyType === "html" && email.body) {
          return `<iframe class="email-body-frame" id="emailFrame${index}" sandbox="allow-same-origin" srcdoc="${esc(email.body)}" onload="resizeFrame(this)"></iframe>`;
        }
        const text = email.body || email.preview || "(No content available)";
        const thread = splitThread(text);

        if (!thread.previous) {
          return `<div class="email-expanded-body">${esc(text)}</div>`;
        }

        return `
          <div class="email-expanded-body">${esc(thread.latest)}</div>
          <button class="thread-toggle" onclick="event.stopPropagation(); toggleThread(${index})" id="threadToggle${index}">Show previous messages</button>
          <div class="thread-previous" id="threadPrevious${index}">
            <div class="email-expanded-body">${esc(thread.previous)}</div>
          </div>
        `;
      }

      function toggleThread(index) {
        const el = document.getElementById(`threadPrevious${index}`);
        const btn = document.getElementById(`threadToggle${index}`);
        if (!el || !btn) return;
        const showing = el.classList.toggle("visible");
        btn.textContent = showing ? "Hide previous messages" : "Show previous messages";
      }

      function resizeFrame(frame) {
        try {
          frame.style.height = frame.contentDocument.body.scrollHeight + 20 + "px";
        } catch (e) { /* sandbox restriction */ }
      }

      function toggleEmail(index) {
        expandedEmail = expandedEmail === index ? null : index;
        renderEmails();
        // Re-spotlight and re-show tooltip if quest is active (DOM was rebuilt)
        if (questState) {
          const task = getCurrentQuestTask();
          if (task) {
            const currentEmailId = getCurrentEmailId(task);
            if (currentEmailId) {
              const el = document.querySelector(`[data-email-id="${currentEmailId}"]`);
              if (el) {
                spotlightElement(el);
                showQuestTooltip(task, el);
              }
            }
          }
        }
      }

      async function draftReply(index) {
        const email = emails[index];
        const box = document.getElementById(`draftBox${index}`);
        const btn = document.getElementById(`btnDraft${index}`);
        if (!box) return;

        // Step 1: Analyse for response options
        btn.disabled = true;
        btn.textContent = "Thinking...";
        box.innerHTML = '<div class="draft-box"><div class="draft-loading">Analysing email...</div></div>';

        try {
          const analyseRes = await fetch(`/api/emails/${encodeURIComponent(email.id)}/analyse`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sender: email.sender,
              senderEmail: email.senderEmail,
              subject: email.subject,
              body: email.body || email.preview,
            }),
          });
          const analyseData = await analyseRes.json();
          const options = analyseData.options || [];
          const missingLink = analyseData.missingLink || null;

          // Store options for after link prompt
          emails[index]._draftOptions = options;

          if (missingLink) {
            // Show link prompt first
            btn.textContent = "Draft Reply";
            btn.disabled = false;
            showLinkPrompt(index, missingLink, options);
          } else if (options.length > 0) {
            // Step 2a: Show options
            btn.textContent = "Draft Reply";
            btn.disabled = false;
            showDraftOptions(index, options);
          } else {
            // Step 2b: No options, draft directly
            btn.textContent = "Drafting...";
            box.innerHTML = '<div class="draft-box"><div class="draft-loading">Drafting reply...</div></div>';
            await executeDraft(index);
          }
        } catch (err) {
          box.innerHTML = `<div class="draft-box"><div class="draft-loading">Error: ${esc(err.message)}</div></div>`;
          btn.disabled = false;
          btn.textContent = "Draft Reply";
        }
      }

      function showLinkPrompt(index, description, options) {
        const box = document.getElementById(`draftBox${index}`);
        if (!box) return;

        box.innerHTML = `
          <div class="draft-box" onclick="event.stopPropagation()">
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">
              I'll need a link before drafting — ${esc(description)}. Do you have one?
            </div>
            <input type="text" class="draft-custom-input" id="linkInput${index}" placeholder="Paste link here..." onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter'){event.stopPropagation(); submitLink(${index})}" />
            <div style="display: flex; gap: 8px;">
              <button class="btn-option" onclick="event.stopPropagation(); submitLink(${index})">Use this link</button>
              <button class="btn-option" onclick="event.stopPropagation(); skipLink(${index})" style="color: var(--text-faded);">Continue without it</button>
            </div>
          </div>
        `;
      }

      function submitLink(index) {
        const input = document.getElementById(`linkInput${index}`);
        const link = input?.value?.trim();
        if (!link) return;
        emails[index]._additionalLinks = [link];
        const options = emails[index]._draftOptions || [];
        if (options.length > 0) {
          showDraftOptions(index, options);
        } else {
          const box = document.getElementById(`draftBox${index}`);
          const btn = document.getElementById(`btnDraft${index}`);
          btn.disabled = true;
          btn.textContent = "Drafting...";
          box.innerHTML = '<div class="draft-box"><div class="draft-loading">Drafting reply...</div></div>';
          executeDraft(index, null, [link]);
        }
      }

      function skipLink(index) {
        const options = emails[index]._draftOptions || [];
        if (options.length > 0) {
          showDraftOptions(index, options);
        } else {
          const box = document.getElementById(`draftBox${index}`);
          const btn = document.getElementById(`btnDraft${index}`);
          btn.disabled = true;
          btn.textContent = "Drafting...";
          box.innerHTML = '<div class="draft-box"><div class="draft-loading">Drafting reply...</div></div>';
          executeDraft(index);
        }
      }

      function showDraftOptions(index, options) {
        const box = document.getElementById(`draftBox${index}`);
        if (!box) return;

        box.innerHTML = `
          <div class="draft-box" onclick="event.stopPropagation()">
